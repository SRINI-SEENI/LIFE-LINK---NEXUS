<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>E-Pharmacy Registration - Admin</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<style>
  :root{
    --bg1:#0f172a;
    --glass: rgba(255,255,255,0.06);
    --accent1: linear-gradient(135deg,#7c3aed,#6366f1);
    --neon: #8b5cf6;
    --muted: rgba(255,255,255,0.75);
  }

  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  html,body{
    height:100%;
    margin:0;
    font-family:Inter, Poppins, "Segoe UI", Roboto, sans-serif;
    background:
      radial-gradient(1000px 500px at -10% 10%, rgba(124,58,237,0.12), transparent 10%),
      radial-gradient(800px 400px at 110% 90%, rgba(99,102,241,0.08), transparent 10%),
      linear-gradient(180deg,var(--bg1), #081024);
    color:white;
    -webkit-font-smoothing:antialiased;
  }

  body {
    min-height: 100vh;
    padding: 30px;
    overflow-y: auto;
  }

  .back-btn {
    position: fixed;
    top: 25px;
    left: 25px;
    padding: 10px 20px;
    font-size: 14px;
    font-weight: 600;
    color: #e6f0f6;
    text-decoration: none;
    border: 1.5px solid rgba(255,255,255,0.15);
    border-radius: 10px;
    transition: all 0.3s ease;
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(10px);
    z-index: 100;
  }

  .back-btn:hover {
    color: #ffffff;
    border-color: rgba(255,255,255,0.3);
    background: rgba(255,255,255,0.1);
    transform: translateX(-3px);
  }

  .container {
    max-width: 800px;
    margin: 60px auto 40px;
    background: linear-gradient(180deg, rgba(255,255,255,0.08), rgba(255,255,255,0.04));
    border: 1px solid rgba(255,255,255,0.1);
    padding: 40px;
    border-radius: 20px;
    backdrop-filter: blur(10px);
    box-shadow: 0 15px 50px rgba(0,0,0,0.3);
  }

  .header {
    text-align: center;
    margin-bottom: 40px;
  }

  .header h1 {
    font-size: 36px;
    font-weight: 800;
    background: linear-gradient(135deg, #7c3aed, #6366f1, #a78bfa);
    background-clip: text;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    margin-bottom: 10px;
  }

  .header p {
    color: var(--muted);
    font-size: 15px;
  }

  .form-group {
    margin-bottom: 25px;
  }

  label {
    display: block;
    margin-bottom: 8px;
    font-weight: 600;
    font-size: 14px;
    color: #e0e7ff;
  }

  input, select, textarea {
    width: 100%;
    padding: 12px 15px;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 10px;
    color: white;
    font-size: 14px;
    font-family: inherit;
    transition: all 0.3s ease;
  }

  input:focus, select:focus, textarea:focus {
    outline: none;
    border-color: #7c3aed;
    background: rgba(255,255,255,0.08);
  }

  input::placeholder, textarea::placeholder {
    color: rgba(255,255,255,0.4);
  }

  select option {
    background: #1e293b;
    color: white;
  }

  textarea {
    min-height: 100px;
    resize: vertical;
  }

  .checkbox-group {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-top: 12px;
    padding: 12px 15px;
    background: rgba(124,58,237,0.05);
    border: 2px solid rgba(124,58,237,0.2);
    border-radius: 10px;
    transition: all 0.3s ease;
  }

  .checkbox-group:hover {
    background: rgba(124,58,237,0.08);
    border-color: rgba(124,58,237,0.3);
  }

  .checkbox-group input[type="checkbox"] {
    width: 20px;
    height: 20px;
    margin: 0;
    cursor: pointer;
    accent-color: #7c3aed;
  }

  .checkbox-group label {
    margin: 0;
    font-weight: 600;
    font-size: 14px;
    cursor: pointer;
    color: #e0e7ff;
  }

  .services-section {
    margin-bottom: 25px;
  }

  .services-section > label {
    display: block;
    margin-bottom: 12px;
    font-weight: 600;
    font-size: 14px;
    color: #e0e7ff;
  }

  .services-section > label::after {
    content: " *";
    color: #ef4444;
  }

  .services-error {
    color: #ef4444;
    font-size: 13px;
    margin-top: 8px;
    display: none;
  }

  .services-error.show {
    display: block;
  }

  .submit-btn {
    width: 100%;
    padding: 15px;
    background: linear-gradient(135deg, #7c3aed, #6366f1);
    color: white;
    border: none;
    border-radius: 12px;
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.3s ease;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-top: 20px;
  }

  .submit-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 10px 30px rgba(124,58,237,0.4);
  }

  .submit-btn:active {
    transform: translateY(0);
  }

  .info-box {
    background: rgba(124,58,237,0.1);
    border: 1px solid rgba(124,58,237,0.3);
    padding: 15px;
    border-radius: 10px;
    margin-bottom: 30px;
    font-size: 13px;
    color: #e0e7ff;
    line-height: 1.6;
  }

  .row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
  }

  @media (max-width: 768px) {
    .row {
      grid-template-columns: 1fr;
    }
    
    .container {
      padding: 30px 20px;
    }
  }
</style>
</head>
<body>

<a href="admin_dashboard.html" class="back-btn">← Back to Dashboard</a>

<div class="container">
  <div class="header">
    <h1>💊 E-Pharmacy Registration</h1>
    <p>Register your pharmacy to receive medicine orders online</p>
  </div>

  <div class="info-box">
    ⚠️ <strong>Important:</strong> By registering, you agree to provide genuine medicines with valid prescriptions. All orders must comply with pharmaceutical regulations.
  </div>

  <form id="registrationForm">
    <div class="form-group">
      <label>Pharmacy Name *</label>
      <input type="text" id="pharmacyName" placeholder="Enter pharmacy name" required>
    </div>

    <div class="form-group">
      <label>Pharmacist Name *</label>
      <input type="text" id="pharmacistName" placeholder="Enter your name" required>
    </div>

    <div class="form-group">
      <label>License Number *</label>
      <input type="text" id="licenseNumber" placeholder="Enter pharmacy license number" required>
    </div>

    <div class="row">
      <div class="form-group">
        <label>State *</label>
        <select id="state" required>
          <option value="">Select State</option>
          <option>Andhra Pradesh</option>
          <option>Telangana</option>
          <option>Karnataka</option>
          <option>Tamil Nadu</option>
          <option>Kerala</option>
          <option>Maharashtra</option>
          <option>Gujarat</option>
          <option>Rajasthan</option>
          <option>Uttar Pradesh</option>
          <option>Delhi</option>
          <option>West Bengal</option>
          <option>Punjab</option>
          <option>Haryana</option>
          <option>Bihar</option>
          <option>Madhya Pradesh</option>
        </select>
      </div>

      <div class="form-group">
        <label>District *</label>
        <input type="text" id="district" placeholder="Enter district" required>
      </div>
    </div>

    <div class="form-group">
      <label>Place / City *</label>
      <input type="text" id="place" placeholder="Enter place or city name" required>
    </div>

    <div class="form-group">
      <label>Full Address *</label>
      <textarea id="address" placeholder="Enter complete address with landmarks" required></textarea>
    </div>

    <div class="row">
      <div class="form-group">
        <label>Contact Number *</label>
        <input type="tel" id="contact" placeholder="Enter contact number" required>
      </div>

      <div class="form-group">
        <label>Email</label>
        <input type="email" id="email" placeholder="Enter email address">
      </div>
    </div>

    <div class="form-group">
      <label>Operating Hours *</label>
      <input type="text" id="operatingHours" placeholder="e.g., 9 AM - 9 PM" required>
    </div>

    <div class="services-section">
      <label>Services Offered</label>
      <div class="checkbox-group">
        <input type="checkbox" id="homeDelivery">
        <label for="homeDelivery">🚚 Home Delivery Available</label>
      </div>
      <div class="checkbox-group">
        <input type="checkbox" id="emergencyService">
        <label for="emergencyService">🚨 24/7 Emergency Service</label>
      </div>
      <div class="checkbox-group">
        <input type="checkbox" id="prescriptionVerification">
        <label for="prescriptionVerification">✅ Online Prescription Verification</label>
      </div>
      <div class="services-error" id="servicesError">⚠️ Please select at least one service</div>
    </div>

    <div class="form-group">
      <label>Additional Information</label>
      <textarea id="additionalInfo" placeholder="Any additional details about your pharmacy services"></textarea>
    </div>

    <button type="submit" class="submit-btn">Register E-Pharmacy</button>
  </form>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.13.0/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.13.0/firebase-auth.js";
import { getFirestore, collection, addDoc, serverTimestamp, query, where, getDocs } from "https://www.gstatic.com/firebasejs/10.13.0/firebase-firestore.js";
import { firebaseConfig } from "../firebase-config.js";

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let currentAdmin = null;

onAuthStateChanged(auth, async (user) => {
  if (!user) {
    alert("Please login as admin first!");
    window.location.href = "admin_login.html";
  } else {
    currentAdmin = user;
    // Check if already registered
    await checkExistingRegistration(user.uid);
  }
});

async function checkExistingRegistration(uid) {
  try {
    console.log("Checking if admin already registered pharmacy...");
    const q = query(collection(db, "epharmacyregistration"), where("adminUid", "==", uid));
    const snapshot = await getDocs(q);
    
    console.log("Found registrations:", snapshot.size);
    
    if (!snapshot.empty) {
      alert("You have already registered a pharmacy! You can only register once.");
      const confirm = window.confirm("Would you like to view the pharmacy orders page?");
      if (confirm) {
        window.location.href = "epharmacy_orders.html";
      } else {
        window.location.href = "admin_dashboard.html";
      }
    }
  } catch (error) {
    console.error("Error checking registration:", error);
  }
}

document.getElementById("registrationForm").addEventListener("submit", async (e) => {
  e.preventDefault();

  if (!currentAdmin) {
    alert("Please login first!");
    return;
  }

  // Validate at least one service is selected
  const homeDelivery = document.getElementById("homeDelivery").checked;
  const emergencyService = document.getElementById("emergencyService").checked;
  const prescriptionVerification = document.getElementById("prescriptionVerification").checked;
  
  if (!homeDelivery && !emergencyService && !prescriptionVerification) {
    document.getElementById("servicesError").classList.add("show");
    document.querySelector(".services-section").scrollIntoView({ behavior: "smooth", block: "center" });
    return;
  } else {
    document.getElementById("servicesError").classList.remove("show");
  }

  const pharmacyData = {
    adminUid: currentAdmin.uid,
    adminEmail: currentAdmin.email,
    pharmacyName: document.getElementById("pharmacyName").value.trim(),
    pharmacistName: document.getElementById("pharmacistName").value.trim(),
    licenseNumber: document.getElementById("licenseNumber").value.trim(),
    state: document.getElementById("state").value,
    district: document.getElementById("district").value.trim(),
    place: document.getElementById("place").value.trim(),
    address: document.getElementById("address").value.trim(),
    contact: document.getElementById("contact").value.trim(),
    email: document.getElementById("email").value.trim(),
    operatingHours: document.getElementById("operatingHours").value.trim(),
    homeDelivery: homeDelivery,
    emergencyService: emergencyService,
    prescriptionVerification: prescriptionVerification,
    additionalInfo: document.getElementById("additionalInfo").value.trim(),
    registeredAt: serverTimestamp(),
    status: "active"
  };

  try {
    await addDoc(collection(db, "epharmacyregistration"), pharmacyData);
    alert("✅ E-Pharmacy registered successfully!\n\nYou can now view and manage medicine orders.");
    window.location.href = "epharmacy_orders.html";
  } catch (error) {
    console.error("Error registering pharmacy:", error);
    alert("Error: " + error.message);
  }
});

// Hide error message when any checkbox is checked
document.querySelectorAll('.services-section input[type="checkbox"]').forEach(checkbox => {
  checkbox.addEventListener("change", () => {
    const anyChecked = document.getElementById("homeDelivery").checked ||
                      document.getElementById("emergencyService").checked ||
                      document.getElementById("prescriptionVerification").checked;
    
    if (anyChecked) {
      document.getElementById("servicesError").classList.remove("show");
    }
  });
});
</script>

</body>
</html>

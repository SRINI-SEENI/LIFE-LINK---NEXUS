<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Dashboard - Life Link Nexus</title>

<!-- Google Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<style>
  body {
    font-family: 'Poppins', sans-serif;
    background: linear-gradient(135deg, #ffffff 40%, #e0e7ff 70%, #d8b4fe 100%);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
    margin: 0;
    overflow: hidden;
    position: relative;
  }

  /* Floating blur circles */
  .circle {
    position: fixed;
    border-radius: 50%;
    background: rgba(255, 255, 255, 0.3);
    filter: blur(70px);
    animation: float 10s infinite ease-in-out;
    z-index: 0;
    pointer-events: none;
  }

  .circle:nth-child(1) {
    width: 300px;
    height: 300px;
    top: 10%;
    left: 10%;
    background: rgba(173, 216, 255, 0.3);
  }

  .circle:nth-child(2) {
    width: 400px;
    height: 400px;
    bottom: 15%;
    right: 10%;
    background: rgba(206, 188, 255, 0.3);
  }

  .circle:nth-child(3) {
    width: 250px;
    height: 250px;
    top: 60%;
    left: 70%;
    background: rgba(180, 200, 255, 0.25);
  }

  @keyframes float {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-20px); }
  }

  /* Main Dashboard Container */
  .dashboard {
    position: relative;
    z-index: 2;
    background: white;
    padding: 35px 30px;
    border-radius: 20px;
    box-shadow: 0 8px 30px rgba(8,12,40,0.08);
    width: 950px;
    max-width: 95%;
    text-align: center;
    transition: transform .25s ease;
  }

  /* Header Section */
  h2 {
    color: #4b0082;
    font-size: 28px;
    margin: 0 0 5px 0;
    font-weight: 800;
    letter-spacing: -0.5px;
  }

  .subtitle {
    color: #555;
    margin: 0;
    font-weight: 500;
    font-size: 14px;
  }

  .role-badge {
    display: inline-block;
    margin-top: 10px;
    padding: 6px 18px;
    background: linear-gradient(90deg, rgba(124,58,237,0.1), rgba(99,102,241,0.08));
    color: #6d28d9;
    border: 1px solid rgba(124,58,237,0.15);
    border-radius: 20px;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.5px;
  }

  /* Button Grid */
  .btn-container {
    margin-top: 25px;
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 18px;
    align-items: stretch;
    justify-items: center;
  }

  @media (max-width: 900px) {
    .btn-container {
      grid-template-columns: repeat(2, 1fr);
      width: 100%;
    }
    .dashboard {
      width: 92%;
      padding: 22px;
    }
  }

  @media (max-width: 550px) {
    .btn-container {
      grid-template-columns: 1fr;
      gap: 14px;
    }
  }

  /* Dashboard Cards */
  .dash-btn {
    width: 100%;
    height: 125px;
    border-radius: 18px;
    border: none;
    cursor: pointer;
    font-weight: 800;
    font-size: 16px;
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    justify-content: center;
    padding: 18px;
    color: #111827;
    background: linear-gradient(180deg, rgba(255,255,255,0.85), rgba(255,255,255,0.72));
    box-shadow: 0 8px 24px rgba(17,24,39,0.06), 0 2px 6px rgba(99,102,241,0.06) inset;
    transition: transform .28s cubic-bezier(.2,.9,.3,1), box-shadow .28s, background .28s, color .28s;
    position: relative;
    overflow: hidden;
    text-align: left;
  }

  .dash-btn .emoji {
    font-size: 28px;
    line-height: 1;
    margin-bottom: 6px;
    filter: drop-shadow(0 6px 18px rgba(99,102,241,0.06));
  }

  .dash-btn .title {
    font-size: 16px;
    color: #2b0850;
    font-weight: 800;
  }

  .dash-btn .card-subtitle {
    font-size: 12px;
    color: rgba(17,24,39,0.55);
    margin-top: 4px;
    font-weight: 600;
    opacity: 0.9;
  }

  .dash-btn::after {
    content: "";
    position: absolute;
    right: -40%;
    top: -30%;
    width: 200%;
    height: 160%;
    background: linear-gradient(120deg, rgba(124,58,237,0.06), rgba(59,130,246,0.06), rgba(236,72,153,0.04));
    transform: rotate(-18deg) translateX(0);
    transition: transform .6s cubic-bezier(.2,.9,.3,1), opacity .4s;
    opacity: 1;
    pointer-events: none;
  }

  .dash-btn:hover {
    transform: translateY(-6px) scale(1.02);
    box-shadow: 0 18px 50px rgba(99,102,241,0.18), 0 6px 18px rgba(99,102,241,0.08) inset;
    background: linear-gradient(135deg, rgba(124,58,237,0.12), rgba(99,102,241,0.08));
    color: #0b1220;
  }

  .dash-btn:hover::after {
    transform: rotate(-18deg) translateX(-8%);
    opacity: 0.95;
  }

  .dash-btn:active {
    transform: translateY(-2px) scale(.99);
    box-shadow: 0 8px 24px rgba(99,102,241,0.12);
  }

  /* Specific Card Color Accents */
  .btn-verify {
    background: linear-gradient(180deg, rgba(255,255,255,0.95), rgba(16,185,129,0.04));
  }

  .btn-epharma {
    background: linear-gradient(180deg, rgba(255,255,255,0.95), rgba(79,70,229,0.04));
  }

  /* Profile Button */
  .profile-btn {
    position: absolute;
    top: 25px;
    right: 25px;
    padding: 8px 16px;
    background: white;
    color: #4b0082;
    text-decoration: none;
    border-radius: 10px;
    font-size: 12px;
    font-weight: 700;
    border: 1.5px solid rgba(75, 0, 130, 0.25);
    transition: all 0.3s ease;
    box-shadow: 0 4px 12px rgba(99,102,241,0.08);
    z-index: 100;
  }

  .profile-btn:hover {
    transform: translateY(-2px);
    background: #fdfcff;
    box-shadow: 0 6px 16px rgba(102, 126, 234, 0.15);
    border-color: rgba(75, 0, 130, 0.45);
  }

  /* Logout button */
  .logout-fixed {
    position: fixed;
    bottom: 25px;
    left: 50%;
    transform: translateX(-50%);
    padding: 8px 18px;
    font-size: 11px;
    background: #ef4444;
    color: white;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    z-index: 999999;
    font-weight: 600;
    box-shadow: 0 4px 12px rgba(239,68,68,0.25);
    transition: all 0.2s;
  }

  .logout-fixed:hover {
    background: linear-gradient(135deg, #ff5a5a, #ff8f4c);
    transform: translateX(-50%) scale(1.08);
    box-shadow: 0 6px 20px rgba(255,80,80,0.5);
    letter-spacing: 0.5px;
  }
</style>
</head>
<body>

<!-- Floating blur circles -->
<div class="circle"></div>
<div class="circle"></div>
<div class="circle"></div>

<!-- Profile Button -->
<a href="admin_profile.html" class="profile-btn">⚙️ Profile Settings</a>

<!-- Main Dashboard -->
<div class="dashboard">
  <div class="header-section">
    <h2 id="adminName">Welcome, Admin 🎉</h2>
    <p class="subtitle">Manage and oversee all platform operations</p>
    <div class="role-badge" id="adminRole">Loading...</div>
  </div>

  <div class="btn-container">
    <button class="dash-btn" onclick="window.location.href='user_requests.html'">
      <div class="emoji">📋</div>
      <div class="title">User Requests</div>
      <div class="card-subtitle">Review & manage user requests</div>
    </button>

    <button class="dash-btn btn-verify" onclick="window.location.href='donar_verification_dashboard.html'">
      <div class="emoji">🧬</div>
      <div class="title">Donor Verification</div>
      <div class="card-subtitle">Verify blood & organ donors</div>
    </button>

    <button class="dash-btn btn-epharma" onclick="checkAndNavigate('epharmacy_register.html')">
      <div class="emoji">💊</div>
      <div class="title">Register E-Pharmacy</div>
      <div class="card-subtitle">Register and link new pharmacies</div>
    </button>

    <button class="dash-btn" onclick="checkAndNavigate('epharmacy_orders.html')">
      <div class="emoji">📦</div>
      <div class="title">E-Pharmacy Orders</div>
      <div class="card-subtitle">View and manage medicine orders</div>
    </button>

    <button class="dash-btn btn-verify" onclick="checkAndNavigate('hospital_registration.html')">
      <div class="emoji">🏥</div>
      <div class="title">Register Clinic</div>
      <div class="card-subtitle">Add doctors and hospital locations</div>
    </button>

    <button class="dash-btn btn-epharma" onclick="checkAndNavigate('booked_appointments.html')">
      <div class="emoji">📅</div>
      <div class="title">Booked Appointments</div>
      <div class="card-subtitle">View booked clinical slots</div>
    </button>
  </div>
</div>

<!-- Logout Button -->
<button class="logout-fixed" onclick="logout()">Logout</button>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.13.0/firebase-app.js";
import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.13.0/firebase-firestore.js";
import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.13.0/firebase-auth.js";
import { firebaseConfig } from "../firebase-config.js";

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

// Load admin
onAuthStateChanged(auth, async (user) => {
    if (!user) return location.href = "admin_login.html";
    const ref = doc(db, "admins", user.uid);
    const snap = await getDoc(ref);

    if (!snap.exists()) {
        alert("Access Denied!");
        return location.href = "admin_login.html";
    }

    const admin = snap.data();
    window.currentAdminData = admin;
    document.getElementById("adminName").innerText = `Welcome, ${admin.name} 🎉`;
    document.getElementById("adminRole").innerText = `Role: ${admin.role || "Administrator"}`;
});

// Permission check & navigation
window.checkAndNavigate = function(targetPage) {
    if (!window.currentAdminData) return;
    const role = (window.currentAdminData.role || "").toLowerCase();
    const extra = (window.currentAdminData.allowedExtraRole || "").toLowerCase();

    if (targetPage === 'epharmacy_register.html' || targetPage === 'epharmacy_orders.html') {
        if (role === 'pharmacy' || extra === 'pharmacy') {
            window.location.href = targetPage;
        } else {
            alert("⚠️ Access Denied:\n\nYour profile role is set to Clinic/Hospital.\nYou cannot access E-Pharmacy features unless the Administrator has allowed it.");
        }
    } else if (targetPage === 'hospital_registration.html' || targetPage === 'booked_appointments.html') {
        if (role === 'clinic' || role === 'hospital' || extra === 'clinic' || extra === 'hospital') {
            window.location.href = targetPage;
        } else {
            alert("⚠️ Access Denied:\n\nYour profile role is set to Pharmacy.\nYou cannot access Clinic/Hospital features unless the Administrator has allowed it.");
        }
    } else {
        window.location.href = targetPage;
    }
};

// Logout function
window.logout = async () => {
    await signOut(auth);
    location.href = "../index.html";
};
</script>

</body>
</html>

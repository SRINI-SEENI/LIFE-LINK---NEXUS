<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Dashboard - Life Link Nexus</title>

<!-- Google Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<style>
  body {
    font-family: 'Poppins', sans-serif;
    background: linear-gradient(135deg, #ffffff 40%, #e0e7ff 70%, #d8b4fe 100%);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
    margin: 0;
    overflow: hidden;
    position: relative;
  }

  /* Floating blur circles */
  .circle {
    position: fixed;
    border-radius: 50%;
    background: rgba(255, 255, 255, 0.3);
    filter: blur(70px);
    animation: float 10s infinite ease-in-out;
    z-index: 0;
    pointer-events: none;
  }

  .circle:nth-child(1) {
    width: 300px;
    height: 300px;
    top: 10%;
    left: 10%;
    background: rgba(173, 216, 255, 0.3);
  }

  .circle:nth-child(2) {
    width: 400px;
    height: 400px;
    bottom: 15%;
    right: 10%;
    background: rgba(206, 188, 255, 0.3);
  }

  .circle:nth-child(3) {
    width: 250px;
    height: 250px;
    top: 60%;
    left: 70%;
    background: rgba(180, 200, 255, 0.25);
  }

  @keyframes float {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-20px); }
  }

  /* Main Dashboard Container */
  .dashboard {
    position: relative;
    z-index: 2;
    background: white;
    padding: 35px 30px;
    border-radius: 20px;
    box-shadow: 0 8px 30px rgba(8,12,40,0.08);
    width: 950px;
    max-width: 95%;
    text-align: center;
    transition: transform .25s ease;
  }

  /* Header Section */
  h2 {
    color: #4b0082;
    font-size: 28px;
    margin: 0 0 5px 0;
    font-weight: 800;
    letter-spacing: -0.5px;
  }

  .subtitle {
    color: #555;
    margin: 0;
    font-weight: 500;
    font-size: 14px;
  }

  .role-badge {
    display: inline-block;
    margin-top: 10px;
    padding: 6px 18px;
    background: linear-gradient(90deg, rgba(124,58,237,0.1), rgba(99,102,241,0.08));
    color: #6d28d9;
    border: 1px solid rgba(124,58,237,0.15);
    border-radius: 20px;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.5px;
  }

  /* Button Grid */
  .btn-container {
    margin-top: 25px;
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 18px;
    align-items: stretch;
    justify-items: center;
  }

  @media (max-width: 900px) {
    .btn-container {
      grid-template-columns: repeat(2, 1fr);
      width: 100%;
    }
    .dashboard {
      width: 92%;
      padding: 22px;
    }
  }

  @media (max-width: 550px) {
    .btn-container {
      grid-template-columns: 1fr;
      gap: 14px;
    }
  }

  /* Dashboard Cards */
  .dash-btn {
    width: 100%;
    height: 125px;
    border-radius: 18px;
    border: none;
    cursor: pointer;
    font-weight: 800;
    font-size: 16px;
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    justify-content: center;
    padding: 18px;
    color: #111827;
    background: linear-gradient(180deg, rgba(255,255,255,0.85), rgba(255,255,255,0.72));
    box-shadow: 0 8px 24px rgba(17,24,39,0.06), 0 2px 6px rgba(99,102,241,0.06) inset;
    transition: transform .28s cubic-bezier(.2,.9,.3,1), box-shadow .28s, background .28s, color .28s;
    position: relative;
    overflow: hidden;
    text-align: left;
  }

  .dash-btn .emoji {
    font-size: 28px;
    line-height: 1;
    margin-bottom: 6px;
    filter: drop-shadow(0 6px 18px rgba(99,102,241,0.06));
  }

  .dash-btn .title {
    font-size: 16px;
    color: #2b0850;
    font-weight: 800;
  }

  .dash-btn .card-subtitle {
    font-size: 12px;
    color: rgba(17,24,39,0.55);
    margin-top: 4px;
    font-weight: 600;
    opacity: 0.9;
  }

  .dash-btn::after {
    content: "";
    position: absolute;
    right: -40%;
    top: -30%;
    width: 200%;
    height: 160%;
    background: linear-gradient(120deg, rgba(124,58,237,0.06), rgba(59,130,246,0.06), rgba(236,72,153,0.04));
    transform: rotate(-18deg) translateX(0);
    transition: transform .6s cubic-bezier(.2,.9,.3,1), opacity .4s;
    opacity: 1;
    pointer-events: none;
  }

  .dash-btn:hover {
    transform: translateY(-6px) scale(1.02);
    box-shadow: 0 18px 50px rgba(99,102,241,0.18), 0 6px 18px rgba(99,102,241,0.08) inset;
    background: linear-gradient(135deg, rgba(124,58,237,0.12), rgba(99,102,241,0.08));
    color: #0b1220;
  }

  .dash-btn:hover::after {
    transform: rotate(-18deg) translateX(-8%);
    opacity: 0.95;
  }

  .dash-btn:active {
    transform: translateY(-2px) scale(.99);
    box-shadow: 0 8px 24px rgba(99,102,241,0.12);
  }

  /* Specific Card Color Accents */
  .btn-verify {
    background: linear-gradient(180deg, rgba(255,255,255,0.95), rgba(16,185,129,0.04));
  }

  .btn-epharma {
    background: linear-gradient(180deg, rgba(255,255,255,0.95), rgba(79,70,229,0.04));
  }

  /* Profile Button */
  .profile-btn {
    position: absolute;
    top: 25px;
    right: 25px;
    padding: 8px 16px;
    background: white;
    color: #4b0082;
    text-decoration: none;
    border-radius: 10px;
    font-size: 12px;
    font-weight: 700;
    border: 1.5px solid rgba(75, 0, 130, 0.25);
    transition: all 0.3s ease;
    box-shadow: 0 4px 12px rgba(99,102,241,0.08);
    z-index: 100;
  }

  .profile-btn:hover {
    transform: translateY(-2px);
    background: #fdfcff;
    box-shadow: 0 6px 16px rgba(102, 126, 234, 0.15);
    border-color: rgba(75, 0, 130, 0.45);
  }

  /* Logout button */
  .logout-fixed {
    position: fixed;
    bottom: 25px;
    left: 50%;
    transform: translateX(-50%);
    padding: 8px 18px;
    font-size: 11px;
    background: #ef4444;
    color: white;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    z-index: 999999;
    font-weight: 600;
    box-shadow: 0 4px 12px rgba(239,68,68,0.25);
    transition: all 0.2s;
  }

  .logout-fixed:hover {
    background: linear-gradient(135deg, #ff5a5a, #ff8f4c);
    transform: translateX(-50%) scale(1.08);
    box-shadow: 0 6px 20px rgba(255,80,80,0.5);
    letter-spacing: 0.5px;
  }

  /* Request Modal Styles */
  .request-modal, .request-modal * {
    box-sizing: border-box;
  }

  .request-modal {
    display: none;
    position: fixed;
    z-index: 10000;
    left: 0;
    top: 0;
    width: 100%;
    height: 100%;
    background-color: rgba(15, 23, 42, 0.6);
    backdrop-filter: blur(8px);
    align-items: center;
    justify-content: center;
    animation: fadeInModal 0.25s ease-out;
  }
  
  .request-modal.show {
    display: flex;
  }

  .modal-content {
    background-color: #0f172a;
    border: 1px solid rgba(255, 255, 255, 0.1);
    border-radius: 20px;
    padding: 30px;
    width: 90%;
    max-width: 500px;
    box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
    position: relative;
    animation: scaleUp 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    text-align: left;
    color: white;
  }

  .close-btn {
    position: absolute;
    top: 15px;
    right: 20px;
    font-size: 28px;
    font-weight: 700;
    color: rgba(255,255,255,0.5);
    cursor: pointer;
    transition: color 0.2s;
    line-height: 1;
  }

  .close-btn:hover {
    color: white;
  }

  .input-group {
    margin-bottom: 20px;
    width: 100%;
  }

  .input-group label {
    display: block;
    font-size: 13px;
    font-weight: 600;
    color: rgba(255,255,255,0.85);
    margin-bottom: 8px;
  }

  .input-group input {
    width: 100%;
    padding: 12px 16px;
    border: 1px solid rgba(255,255,255,0.2);
    background: #1e293b;
    color: white;
    border-radius: 10px;
    font-size: 13.5px;
    transition: all 0.2s;
  }

  .input-group input:focus {
    outline: none;
    border-color: #8b5cf6;
    box-shadow: 0 0 0 3px rgba(139, 92, 246, 0.15);
  }

  /* Tooltip styling */
  .tooltip {
    position: relative;
    display: inline-block;
    cursor: pointer;
    margin-left: 6px;
    color: #a78bfa;
    font-size: 14px;
    vertical-align: middle;
  }

  .tooltip .tooltiptext {
    visibility: hidden;
    width: 250px;
    background-color: #1e293b;
    color: #fff;
    text-align: left;
    border-radius: 6px;
    padding: 8px 12px;
    position: absolute;
    z-index: 10005;
    bottom: 125%;
    left: 50%;
    transform: translateX(-50%);
    opacity: 0;
    transition: opacity 0.2s;
    font-size: 11px;
    font-weight: 400;
    line-height: 1.4;
    border: 1px solid rgba(255, 255, 255, 0.15);
    box-shadow: 0 4px 15px rgba(0, 0, 0, 0.35);
    white-space: normal;
  }

  .tooltip:hover .tooltiptext {
    visibility: visible;
    opacity: 1;
  }

  .submit-btn {
    width: 100%;
    padding: 14px;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    font-size: 14px;
    font-weight: 700;
    transition: all 0.2s;
  }

  .submit-btn:hover {
    transform: translateY(-1.5px);
  }

  .badge-pending {
    background: rgba(245, 158, 11, 0.25);
    color: #fdba74;
    font-size: 10px;
    font-weight: 700;
    padding: 2px 8px;
    border-radius: 20px;
    margin-top: 4px;
    display: inline-block;
    border: 1px solid rgba(245, 158, 11, 0.3);
  }

  .badge-declined {
    background: rgba(239, 68, 68, 0.25);
    color: #fca5a5;
    font-size: 10px;
    font-weight: 700;
    padding: 2px 8px;
    border-radius: 20px;
    margin-top: 4px;
    display: inline-block;
    border: 1px solid rgba(239, 68, 68, 0.3);
  }

  @keyframes fadeInModal {
    from { opacity: 0; }
    to { opacity: 1; }
  }

  @keyframes scaleUp {
    from { transform: scale(0.95); opacity: 0; }
    to { transform: scale(1); opacity: 1; }
  }
</style>
</head>
<body>

<!-- Floating blur circles -->
<div class="circle"></div>
<div class="circle"></div>
<div class="circle"></div>

<!-- Profile Button -->
<a href="admin_profile.html" class="profile-btn">⚙️ Profile Settings</a>

<!-- Main Dashboard -->
<div class="dashboard">
  <div class="header-section">
    <h2 id="adminName">Welcome, Admin 🎉</h2>
    <p class="subtitle">Manage and oversee all platform operations</p>
    <div class="role-badge" id="adminRole">Loading...</div>
  </div>

  <div class="btn-container">
    <button class="dash-btn" onclick="window.location.href='user_requests.html'">
      <div class="emoji">📋</div>
      <div class="title">User Requests</div>
      <div class="card-subtitle">Review & manage user requests</div>
    </button>

    <button class="dash-btn btn-verify" onclick="window.location.href='donar_verification_dashboard.html'">
      <div class="emoji">🧬</div>
      <div class="title">Donor Verification</div>
      <div class="card-subtitle">Verify blood & organ donors</div>
    </button>

    <button class="dash-btn btn-epharma" id="btnRegisterEpharmacy" onclick="checkAndNavigate('epharmacy_register.html')">
      <div class="emoji">💊</div>
      <div class="title">Register E-Pharmacy</div>
      <div class="card-subtitle">Register and link new pharmacies</div>
    </button>

    <button class="dash-btn" id="btnEpharmacyOrders" onclick="checkAndNavigate('epharmacy_orders.html')">
      <div class="emoji">📦</div>
      <div class="title">E-Pharmacy Orders</div>
      <div class="card-subtitle">View and manage medicine orders</div>
    </button>

    <button class="dash-btn btn-verify" id="btnRegisterClinic" onclick="checkAndNavigate('hospital_registration.html')">
      <div class="emoji">🏥</div>
      <div class="title">Register Clinic</div>
      <div class="card-subtitle">Add doctors and hospital locations</div>
    </button>

    <button class="dash-btn btn-epharma" id="btnBookedAppointments" onclick="checkAndNavigate('booked_appointments.html')">
      <div class="emoji">📅</div>
      <div class="title">Booked Appointments</div>
      <div class="card-subtitle">View booked clinical slots</div>
    </button>
  </div>
</div>

<!-- Extra Role Request Modal -->
<div id="requestRoleModal" class="request-modal">
  <div class="modal-content">
    <span class="close-btn" onclick="closeRequestModal()">&times;</span>
    <h2 id="requestModalTitle" style="font-size: 20px; font-weight: 700; margin-bottom: 5px; color: #a78bfa;">Request Extra Role</h2>
    <p style="color: rgba(255,255,255,0.7); font-size: 13px; margin-bottom: 20px;">Please submit validation credentials to request the extra role from the maintainer.</p>
    
    <form id="requestForm" onsubmit="submitExtraRoleRequest(event)">
      <input type="hidden" id="requestedRoleInput" />
      
      <div class="input-group">
        <label>
          Certificate Document Link (Google Drive / Dropbox) *
          <span class="tooltip">ℹ️<span class="tooltiptext">Provide the pharmacy/medical degree and official approval certificate.</span></span>
        </label>
        <input type="url" id="reqCertificateLink" placeholder="https://drive.google.com/..." required />
      </div>

      <div class="input-group">
        <label>
          Address Proof Document Link (Google Drive / Dropbox) *
          <span class="tooltip">ℹ️<span class="tooltiptext">Provide Aadhar, Voter ID, or any government-issued certificate showing your address.</span></span>
        </label>
        <input type="url" id="reqAddressProofLink" placeholder="https://drive.google.com/..." required />
      </div>

      <div class="input-group">
        <label>
          GPS Map Camera Images Link (Google Drive / Dropbox Folder) *
          <span class="tooltip">ℹ️<span class="tooltiptext">Provide images showing the entire pharmacy/clinic facility with clear coordinates overlay.</span></span>
        </label>
        <input type="url" id="reqGpsImagesLink" placeholder="https://drive.google.com/..." required />
        <p style="color: rgba(255,255,255,0.5); font-size: 11px; margin-top: 4px;">⚠️ Images must show the facility location with coordinates overlay.</p>
      </div>

      <button type="submit" class="submit-btn" style="background: linear-gradient(135deg, #7c3aed 0%, #6366f1 100%); font-weight: 700; color: white;">Submit Permission Request</button>
    </form>
  </div>
</div>

<!-- Logout Button -->
<button class="logout-fixed" onclick="logout()">Logout</button>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.13.0/firebase-app.js";
import { getFirestore, doc, getDoc, setDoc, collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/10.13.0/firebase-firestore.js";
import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.13.0/firebase-auth.js";
import { firebaseConfig } from "../firebase-config.js";

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

let currentExtraRequest = null;

// Load admin
onAuthStateChanged(auth, async (user) => {
    if (!user) return location.href = "admin_login.html";
    const ref = doc(db, "admins", user.uid);
    const snap = await getDoc(ref);

    if (!snap.exists()) {
        alert("Access Denied!");
        return location.href = "admin_login.html";
    }

    const admin = snap.data();
    window.currentAdminData = admin;
    document.getElementById("adminName").innerText = `Welcome, ${admin.name} 🎉`;
    document.getElementById("adminRole").innerText = `Role: ${admin.role || "Administrator"}`;

    // LOCKING LOGIC FOR CARDS
    const roleLower = (admin.role || "").toLowerCase();
    const extraLower = (admin.allowedExtraRole || "").toLowerCase();

    const isPharmacy = roleLower === 'pharmacy' || extraLower === 'pharmacy';
    const isClinic = roleLower === 'clinic' || roleLower === 'hospital' || extraLower === 'clinic' || extraLower === 'hospital';

    // Update E-Pharmacy Orders card
    const btnOrders = document.getElementById("btnEpharmacyOrders");
    if (btnOrders) {
        if (!isPharmacy) {
            btnOrders.style.opacity = "0.5";
            btnOrders.style.cursor = "not-allowed";
            const title = btnOrders.querySelector(".title");
            if (title && !title.innerHTML.includes("🔒")) {
                title.innerHTML = "🔒 " + title.innerHTML;
            }
        } else {
            btnOrders.style.opacity = "1";
            btnOrders.style.cursor = "pointer";
        }
    }

    // Update Booked Appointments card
    const btnApts = document.getElementById("btnBookedAppointments");
    if (btnApts) {
        if (!isClinic) {
            btnApts.style.opacity = "0.5";
            btnApts.style.cursor = "not-allowed";
            const title = btnApts.querySelector(".title");
            if (title && !title.innerHTML.includes("🔒")) {
                title.innerHTML = "🔒 " + title.innerHTML;
            }
        } else {
            btnApts.style.opacity = "1";
            btnApts.style.cursor = "pointer";
        }
    }

    await checkExtraRoleRequest(user.uid);
});

async function checkExtraRoleRequest(uid) {
    try {
        const q = query(collection(db, "extraRoleRequests"), where("adminUid", "==", uid));
        const snapshot = await getDocs(q);
        if (!snapshot.empty) {
            let docs = [];
            snapshot.forEach(d => docs.push(d.data()));
            docs.sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt));
            currentExtraRequest = docs[0];
            updateDashboardBadges(currentExtraRequest);
        }
    } catch (err) {
        console.error("Error checking extra role requests:", err);
    }
}

function updateDashboardBadges(req) {
    if (!req) return;
    const isPharmacy = req.requestedRole === 'Pharmacy';
    let badgeText = '';

    if (req.status === 'pending') {
        badgeText = ' <span class="badge badge-pending">Pending Review</span>';
    } else if (req.status === 'approved') {
        badgeText = ' <span class="badge badge-approved">Approved</span>';
    } else if (req.status === 'declined') {
        badgeText = ' <span class="badge badge-declined">Declined</span>';
    }

    if (isPharmacy) {
        const titleEl = document.querySelector(".btn-epharma .title");
        if (titleEl && badgeText) titleEl.innerHTML = `Register E-Pharmacy ${badgeText}`;
    } else {
        const titleEl = document.querySelector(".btn-verify .title");
        if (titleEl && badgeText) titleEl.innerHTML = `Register Clinic ${badgeText}`;
    }
}

// Permission check & navigation
window.checkAndNavigate = function(targetPage) {
    if (!window.currentAdminData) return;
    const role = (window.currentAdminData.role || "").toLowerCase();
    const extra = (window.currentAdminData.allowedExtraRole || "").toLowerCase();

    const isPharmacy = role === 'pharmacy' || extra === 'pharmacy';
    const isClinic = role === 'clinic' || role === 'hospital' || extra === 'clinic' || extra === 'hospital';

    if (targetPage === 'epharmacy_orders.html') {
        if (isPharmacy) {
            window.location.href = targetPage;
        } else {
            alert("🔒 Access Locked:\n\nYou must first request and receive approval for the Pharmacy role using the 'Register E-Pharmacy' button.");
        }
        return;
    }

    if (targetPage === 'booked_appointments.html') {
        if (isClinic) {
            window.location.href = targetPage;
        } else {
            alert("🔒 Access Locked:\n\nYou must first request and receive approval for the Clinic/Hospital role using the 'Register Clinic' button.");
        }
        return;
    }

    if (targetPage === 'epharmacy_register.html') {
        if (isPharmacy) {
            window.location.href = targetPage;
        } else {
            handleRestriction('Pharmacy');
        }
        return;
    }

    if (targetPage === 'hospital_registration.html') {
        if (isClinic) {
            window.location.href = targetPage;
        } else {
            handleRestriction('Clinic');
        }
        return;
    }

    window.location.href = targetPage;
};

function handleRestriction(requestedRole) {
    if (currentExtraRequest && currentExtraRequest.requestedRole === requestedRole) {
        if (currentExtraRequest.status === 'pending') {
            alert(`⏳ Request Pending:\n\nYour request for the '${requestedRole}' role is currently pending review by the maintainer.`);
            return;
        }
        if (currentExtraRequest.status === 'declined') {
            const declinedDate = new Date(currentExtraRequest.declinedAt);
            const now = new Date();
            const diffTime = Math.abs(now - declinedDate);
            const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));
            const remainingDays = 60 - diffDays;
            
            if (remainingDays > 0) {
                alert(`❌ Request Blocked:\n\nYour previous request was declined. In accordance with platform policy, you cannot request again for another ${remainingDays} days.`);
                return;
            }
        }
    }
    window.openRequestModal(requestedRole);
}

window.openRequestModal = function(requestedRole) {
    document.getElementById("requestedRoleInput").value = requestedRole;
    document.getElementById("requestModalTitle").textContent = `Request ${requestedRole} Access`;
    document.getElementById("requestRoleModal").classList.add("show");
};

window.closeRequestModal = function() {
    document.getElementById("requestRoleModal").classList.remove("show");
};

function isValidHttpUrl(string) {
  let url;
  try {
    url = new URL(string);
  } catch (_) {
    return false;  
  }
  return url.protocol === "http:" || url.protocol === "https:";
}

window.submitExtraRoleRequest = async function(event) {
    event.preventDefault();
    const requestedRole = document.getElementById("requestedRoleInput").value;
    const certificateLink = document.getElementById("reqCertificateLink").value.trim();
    const addressProofLink = document.getElementById("reqAddressProofLink").value.trim();
    const gpsImagesLink = document.getElementById("reqGpsImagesLink").value.trim();

    if (!isValidHttpUrl(certificateLink)) {
        alert("Please enter a valid working URL link for your Certificate.");
        return;
    }
    if (!isValidHttpUrl(addressProofLink)) {
        alert("Please enter a valid working URL link for your Address Proof.");
        return;
    }
    if (!isValidHttpUrl(gpsImagesLink)) {
        alert("Please enter a valid working URL link for your GPS Facility Images.");
        return;
    }

    try {
        const user = auth.currentUser;
        const requestId = `${user.uid}_${requestedRole}`;
        
        await setDoc(doc(db, "extraRoleRequests", requestId), {
            requestId: requestId,
            adminUid: user.uid,
            adminName: window.currentAdminData.name,
            adminEmail: window.currentAdminData.email,
            primaryRole: window.currentAdminData.role,
            requestedRole: requestedRole,
            certificateLink: certificateLink,
            addressProofLink: addressProofLink,
            gpsImagesLink: gpsImagesLink,
            status: "pending",
            createdAt: new Date().toISOString()
        });

        alert("✓ Permission request submitted!\n\nYour documents have been sent to the maintainer for verification.");
        window.closeRequestModal();
        location.reload();
    } catch(err) {
        console.error("Error submitting permission request:", err);
        alert("Failed to submit request: " + err.message);
    }
};

// Logout function
window.logout = async () => {
    await signOut(auth);
    location.href = "../index.html";
};
</script>

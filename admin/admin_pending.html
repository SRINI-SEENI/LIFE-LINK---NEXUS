<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Awaiting Approval - Life Link Nexus</title>
  <style>
    body {
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(135deg, #ede9fe, #eef2ff);
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
    }

    .pending-box {
      background: #fff;
      padding: 40px;
      border-radius: 20px;
      box-shadow: 0 8px 25px rgba(0, 0, 0, 0.1);
      text-align: center;
      width: 380px;
      animation: fadeIn 1.2s ease-in-out;
    }

    h2 {
      color: #4b0082;
      font-size: 24px;
      margin-bottom: 10px;
    }

    p {
      color: #444;
      line-height: 1.6;
      font-size: 15px;
    }

    .loader {
      margin: 20px auto;
      border: 6px solid #f3f3f3;
      border-top: 6px solid #7c3aed;
      border-radius: 50%;
      width: 45px;
      height: 45px;
      animation: spin 1.3s linear infinite;
    }

    button {
      margin-top: 20px;
      padding: 10px 20px;
      border: none;
      background: linear-gradient(135deg, #6366f1, #7c3aed);
      color: white;
      border-radius: 8px;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      background: linear-gradient(135deg, #7c3aed, #3b82f6);
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div class="pending-box">
    <div class="loader"></div>
    <h2>Approval Pending</h2>
    <p>
      Your account request has been sent to the Maintainer for approval.<br>
      Once approved, you’ll be able to log in and manage your services.
    </p>
    <button onclick="window.location.href='admin_login.html'">Back to Login</button>
  </div>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Blood Donations — Admin</title>
<style>
  * {
    box-sizing: border-box;
  }

  @keyframes gradientShift {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
  }

  @keyframes floatUp {
    from {
      opacity: 0;
      transform: translateY(30px);
    }
    to {
      opacity: 1;
      transform: translateY(0);
    }
  }

  @keyframes shimmer {
    0% { background-position: -1000px 0; }
    100% { background-position: 1000px 0; }
  }

  @keyframes pulse {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.05); }
  }

  @keyframes glow {
    0%, 100% { box-shadow: 0 0 20px rgba(139, 92, 246, 0.3); }
    50% { box-shadow: 0 0 40px rgba(139, 92, 246, 0.6); }
  }

  body {
    margin: 0;
    padding: 0;
    font-family: "Poppins", sans-serif;
    background: linear-gradient(135deg, #ffffff 40%, #e0e7ff 70%, #d8b4fe 100%);
    min-height: 100vh;
    color: #1a202c;
    position: relative;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background: 
      radial-gradient(circle at 10% 10%, rgba(173, 216, 255, 0.3) 0%, transparent 40%),
      radial-gradient(circle at 90% 90%, rgba(206, 188, 255, 0.3) 0%, transparent 40%),
      radial-gradient(circle at 70% 60%, rgba(180, 200, 255, 0.25) 0%, transparent 40%);
    pointer-events: none;
    z-index: 0;
  }

  header {
    position: relative;
    text-align: center;
    padding: 40px 20px;
    background: linear-gradient(135deg, rgba(255, 255, 255, 0.95) 0%, rgba(255, 255, 255, 0.85) 100%);
    border-bottom: 3px solid transparent;
    border-image: linear-gradient(90deg, #667eea, #764ba2, #f093fb);
    border-image-slice: 1;
    backdrop-filter: blur(30px) saturate(180%);
    box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
    animation: floatUp 0.8s ease-out;
    z-index: 10;
  }

  header::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 100%;
    background: linear-gradient(90deg, 
      transparent 0%, 
      rgba(255, 255, 255, 0.6) 50%, 
      transparent 100%);
    background-size: 200% 100%;
    animation: shimmer 3s infinite;
    pointer-events: none;
  }

  header h1 {
    margin: 0;
    font-size: 32px;
    font-weight: 800;
    background: linear-gradient(135deg, #ef4444 0%, #dc2626 50%, #f87171 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    text-shadow: 0 0 30px rgba(239, 68, 68, 0.3);
    letter-spacing: -1px;
    position: relative;
    z-index: 1;
    filter: drop-shadow(0 4px 6px rgba(0, 0, 0, 0.1));
  }

  .wrap { 
    width: 95%;
    max-width: 1400px;
    margin: 40px auto;
    padding: 20px;
    position: relative;
    z-index: 1;
  }

  .controls {
    display: flex;
    gap: 15px;
    align-items: center;
    margin-bottom: 30px;
    flex-wrap: wrap;
    animation: floatUp 0.8s ease-out;
    animation-delay: 0.2s;
    animation-fill-mode: backwards;
  }

  .btn {
    padding: 6px 14px;
    background: rgba(255, 255, 255, 0.9);
    border: 2px solid rgba(239, 68, 68, 0.3);
    border-radius: 8px;
    color: #1f2937;
    font-size: 11px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.3s ease;
    text-transform: none;
    letter-spacing: normal;
    min-width: auto;
    box-shadow: 0 4px 15px rgba(239, 68, 68, 0.2);
    position: relative;
    overflow: hidden;
  }

  .btn::before {
    content: '';
    position: absolute;
    top: 50%;
    left: 50%;
    width: 0;
    height: 0;
    border-radius: 50%;
    background: rgba(255, 255, 255, 0.3);
    transform: translate(-50%, -50%);
    transition: width 0.6s, height 0.6s;
  }

  .btn:hover::before {
    width: 300px;
    height: 300px;
  }

  .btn.active {
    background: linear-gradient(135deg, #ef4444, #dc2626);
    border-color: #ef4444;
    color: white;
    box-shadow: 0 6px 20px rgba(239, 68, 68, 0.4);
  }

  .btn:hover {
    background: rgba(239, 68, 68, 0.1);
    border-color: #ef4444;
    box-shadow: 0 6px 20px rgba(239, 68, 68, 0.3);
  }

  .btn:active {
    transform: translateY(0) scale(0.98);
  }

  .btn.secondary {
    background: rgba(255, 255, 255, 0.9);
    border: 2px solid rgba(16, 185, 129, 0.3);
    box-shadow: 0 4px 15px rgba(16, 185, 129, 0.2);
  }

  .btn.secondary.active {
    background: linear-gradient(135deg, #10b981, #059669);
    border-color: #10b981;
    color: white;
    box-shadow: 0 6px 20px rgba(16, 185, 129, 0.4);
  }

  .btn.secondary:hover {
    background: rgba(16, 185, 129, 0.1);
    border-color: #10b981;
    box-shadow: 0 6px 20px rgba(16, 185, 129, 0.3);
  }

  .verify-btn {
    padding: 6px 14px;
    font-size: 11px;
    font-weight: 600;
    color: white;
    background: linear-gradient(135deg, #10b981 0%, #059669 100%);
    border: none;
    border-radius: 8px;
    cursor: pointer;
    box-shadow: 0 4px 12px rgba(16, 185, 129, 0.2);
    transition: all 0.2s ease;
  }
  .verify-btn:hover {
    transform: translateY(-1.5px);
    box-shadow: 0 6px 16px rgba(16, 185, 129, 0.4);
  }

  .unverify-btn {
    padding: 6px 14px;
    font-size: 11px;
    font-weight: 600;
    color: white;
    background: linear-gradient(135deg, #f87171 0%, #ef4444 100%);
    border: none;
    border-radius: 8px;
    cursor: pointer;
    box-shadow: 0 4px 12px rgba(239, 68, 68, 0.2);
    transition: all 0.2s ease;
  }
  .unverify-btn:hover {
    transform: translateY(-1.5px);
    box-shadow: 0 6px 16px rgba(239, 68, 68, 0.4);
  }

  .status-pill {
    display: inline-block;
    padding: 6px 14px;
    border-radius: 8px;
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    box-shadow: 0 4px 15px rgba(0, 0, 0, 0.15);
    position: relative;
    overflow: hidden;
  }

  .status-pill::before {
    content: '';
    position: absolute;
    top: 0;
    left: -100%;
    width: 100%;
    height: 100%;
    background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.3), transparent);
    transition: left 0.5s;
  }

  .status-pill:hover::before {
    left: 100%;
  }

  .status-pending {
    background: linear-gradient(135deg, #fef3c7 0%, #fde68a 100%);
    color: #92400e;
    border: 2px solid #f59e0b;
  }

  .status-verified {
    background: linear-gradient(135deg, #d1fae5 0%, #a7f3d0 100%);
    color: #065f46;
    border: 2px solid #10b981;
  }

  .status-rejected {
    background: linear-gradient(135deg, #fee2e2 0%, #fecaca 100%);
    color: #991b1b;
    border: 2px solid #ef4444;
  }

  #message { 
    color: #6b7280;
    font-weight: 500;
    font-size: 14px;
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
    gap: 20px;
  }

  .card {
    background: rgba(255, 255, 255, 0.85);
    backdrop-filter: blur(20px) saturate(180%);
    border: 1px solid rgba(102, 126, 234, 0.2);
    border-radius: 16px;
    padding: 20px;
    transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    position: relative;
    overflow: hidden;
    box-shadow: 
      0 8px 32px rgba(102, 126, 234, 0.15),
      0 0 0 1px rgba(255, 255, 255, 0.5) inset;
  }

  .card::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 3px;
    background: linear-gradient(90deg, #ef4444 0%, #dc2626 50%, #f87171 100%);
    background-size: 200% 100%;
    animation: shimmer 3s linear infinite;
  }

  .card::after {
    content: '';
    position: absolute;
    inset: -2px;
    background: linear-gradient(135deg, #ef4444, #dc2626, #f87171);
    border-radius: 16px;
    z-index: -1;
    opacity: 0;
    transition: opacity 0.4s;
    filter: blur(10px);
  }

  .card:hover {
    transform: translateY(-5px) scale(1.01);
    box-shadow: 
      0 15px 45px rgba(239, 68, 68, 0.12),
      0 0 25px rgba(239, 68, 68, 0.08),
      0 0 0 1px rgba(255, 255, 255, 0.8) inset;
    border-color: rgba(239, 68, 68, 0.4);
  }

  .card:hover::after {
    opacity: 0.25;
  }

  .row {
    display: grid;
    grid-template-columns: 140px 1fr;
    gap: 12px;
    padding: 8px 0;
    border-bottom: 1px solid rgba(239, 68, 68, 0.08);
    transition: all 0.3s;
    font-size: 13px;
  }

  .row:last-child {
    border-bottom: none;
  }

  .row:hover {
    padding-left: 8px;
    background: linear-gradient(90deg, rgba(239, 68, 68, 0.05) 0%, transparent 100%);
    border-radius: 6px;
  }

  .label {
    font-weight: 700;
    background: linear-gradient(135deg, #ef4444 0%, #dc2626 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    font-size: 12px;
    display: flex;
    align-items: center;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .label::before {
    content: '▸';
    margin-right: 6px;
    color: #ef4444;
    font-size: 10px;
  }

  .value {
    color: #1f2937;
    font-size: 13px;
    word-break: break-word;
    font-weight: 500;
    line-height: 1.5;
  }

  footer.note { 
    margin-top: 40px;
    color: #6b7280;
    font-size: 14px;
    text-align: center;
    font-weight: 500;
  }

  .empty {
    text-align: center;
    color: #6b7280;
    padding: 60px 20px;
    border-radius: 16px;
    background: rgba(255, 255, 255, 0.7);
    backdrop-filter: blur(20px);
    border: 1px solid rgba(102, 126, 234, 0.2);
    box-shadow: 0 8px 32px rgba(102, 126, 234, 0.15);
  }

  .back-btn {
    position: fixed;
    bottom: 25px;
    left: 25px;
    padding: 6px 14px;
    font-size: 11px;
    font-weight: 600;
    color: #1f2937;
    text-decoration: none;
    border: 2px solid rgba(102, 126, 234, 0.3);
    border-radius: 8px;
    transition: all 0.3s ease;
    background: rgba(255, 255, 255, 0.9);
    backdrop-filter: blur(20px);
    z-index: 100;
    box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
  }

  .back-btn:hover {
    color: #667eea;
    border-color: #667eea;
    background: rgba(255, 255, 255, 1);
    transform: translateX(-3px);
    box-shadow: 0 6px 20px rgba(102, 126, 234, 0.2);
  }

  @media (max-width:420px){
    header { 
      padding: 20px 10px;
    }
    header h1 {
      font-size: 28px;
    }
    .controls { 
      flex-direction: column;
      align-items: stretch;
    }
    .grid {
      grid-template-columns: 1fr;
    }
  }
</style>
</head>
<body>
<!-- Back Button -->
<a href="donar_verification_dashboard.html" class="back-btn">Back</a>

<header class="wrap">
  <div>
    <h1>Blood Donations — All Verification Pending Records</h1>
  </div>
</header>

<main class="wrap">
  <div class="controls">
    <button id="refreshBtn" class="btn active">Pending Verifications</button>
    <button id="allBtn" class="btn secondary">Show All</button>
    <div id="message">Checking authentication...</div>
  </div>

  <div id="grid" class="grid"></div>

  <div id="empty" class="empty" style="display:none">No records found.</div>

  <footer class="note">Refresh after new entries. Login using admin account.</footer>
</main>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
import { 
  getFirestore, collection, getDocs, doc, getDoc, updateDoc 
} from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
import { firebaseConfig } from "../firebase-config.js";

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

const grid = document.getElementById('grid');
const msg = document.getElementById('message');
const emptyBox = document.getElementById('empty');
const refreshBtn = document.getElementById('refreshBtn');
const allBtn = document.getElementById('allBtn');

async function updateStatus(id, status){
  await updateDoc(doc(db, "donations", id), { status });
  loadPending();
}

function formatTime(ts){
  try{
    if(!ts) return '-';
    if(ts.toDate) return ts.toDate().toLocaleString();
    if(ts.seconds) return new Date(ts.seconds*1000).toLocaleString();
    return new Date(ts).toLocaleString();
  }catch{return String(ts);}
}

function row(label, value){
  return `<div class="row"><div class="label">${label}</div><div class="value">${value ?? '-'}</div></div>`;
}

function renderCard(id, d){
  const status = d.status || "Pending Verification";
  const statusClass =
    status==="Verified"?"status-verified":
    status==="Unverified"?"status-rejected":"status-pending";

  const card = document.createElement("div");
  card.className = "card";
  card.innerHTML = `
    ${row("Name", d.name ?? d.donorName)}
    ${row("Age", d.age)}
    ${row("Gender", d.gender)}
    ${row("Blood Group", d.bloodGroup ?? d.bloodgroup ?? "-")}
    ${row("Phone", d.phone ?? d.contact ?? "-")}
    ${row("Email", d.email)}
    ${row("State", d.state)}
    ${row("District", d.district)}
    ${row("Address", d.address)}
    ${row("Address Proof", d.addressProofLink ? `<a href="${d.addressProofLink}" target="_blank" style="color: #6366f1; font-weight: 600; text-decoration: none; display: inline-flex; align-items: center; gap: 4px;">📄 View link</a>` : "N/A")}

    <div style="display:flex; flex-wrap: wrap; justify-content:space-between; gap:10px; margin-top:10px; align-items:center;">
      <div class="status-pill ${statusClass}">${status}</div>
      <div style="display:flex; gap:8px;">
        <button class="verify-btn" id="v-${id}">Verify</button>
        <button class="unverify-btn" id="u-${id}">Unverify</button>
      </div>
    </div>
  `;

  card.querySelector(`#v-${id}`).addEventListener("click",()=>updateStatus(id,"Verified"));
  card.querySelector(`#u-${id}`).addEventListener("click",()=>updateStatus(id,"Unverified"));
  return card;
}

async function loadPending(){
  grid.innerHTML=''; emptyBox.style.display='none';
  msg.textContent="⏳ Loading pending...";

  const snap = await getDocs(collection(db,"donations"));
  let c=0;
  snap.forEach(docSnap=>{
    const d=docSnap.data();
    if((d.status||"Pending Verification")==="Pending Verification"){
      grid.appendChild(renderCard(docSnap.id,d)); c++;
    }
  });
  if(c===0){ emptyBox.style.display='block'; emptyBox.textContent="✅ No pending"; }
  msg.textContent=`✅ Loaded ${c}`;
}

async function loadAll(){
  grid.innerHTML=''; emptyBox.style.display='none';
  msg.textContent="⏳ Loading all...";
  const snap = await getDocs(collection(db,"donations"));
  let c=0; snap.forEach(d=>{ grid.appendChild(renderCard(d.id,d.data())); c++; });
  msg.textContent=`✅ Loaded ${c}`;
}

onAuthStateChanged(auth,async user=>{
  if(!user){ msg.textContent="Login required"; emptyBox.style.display='block'; return; }
  const adminDoc=await getDoc(doc(db,"admins",user.uid));
  if(!adminDoc.exists()){ msg.textContent="Access denied"; return; }
  loadPending();
});

refreshBtn.addEventListener("click",loadPending);
allBtn.addEventListener("click",loadAll);
</script>

</body>
</html>

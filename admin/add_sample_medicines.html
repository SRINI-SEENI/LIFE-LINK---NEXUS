const auth = getAuth(app);

// Check authentication first
onAuthStateChanged(auth, async (user) => {
  const statusEl = document.getElementById("status");
  
  if (!user) {
    statusEl.innerHTML = '<span class="error">❌ Please login as admin first!</span><br><br><a href="admin_login.html" style="color: #7c3aed;">Go to Admin Login</a>';
    return;
  }
  
  statusEl.innerHTML = '✓ Logged in as: ' + user.email + '<br><br>Checking existing medicines...';
  
  try {
    // Get existing medicines
    const existingDocs = await getDocs(collection(db, "tablets"));
    const existingNames = new Set();
    existingDocs.forEach(doc => {
      existingNames.add(doc.data().name);
    });
    
    statusEl.innerHTML = '✓ Found ' + existingNames.size + ' existing medicines<br><br>Adding new medicines...';
    
    let count = 0;
    let skipped = 0;
    for (const medicine of medicines) {
      // Skip if already exists
      if (existingNames.has(medicine.name)) {
        skipped++;
        continue;
      }
      await addDoc(collection(db, "tablets"), medicine);
      count++;
      statusEl.innerHTML = `✓ Logged in<br><br>Added ${count} new medicines (Skipped ${skipped} existing)...`;
    }
    
    statusEl.innerHTML = `<span class="success">✅ Successfully added ${count} new medicines!</span><br><br>Skipped ${skipped} existing medicines.<br><br>Total medicines in database: ${existingNames.size + count}<br><br>You can close this tab now.`;
  } catch (error) {
    console.error("Error:", error);
    statusEl.innerHTML = `<span class="error">❌ Error: ${error.message}</span><br><br>Make sure you are logged in as an admin.`;
  }
});

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Admin Login - Life Link Nexus</title>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap');

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-20px); }
    }

    body {
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(135deg, #ffffff 40%, #e0e7ff 70%, #d8b4fe 100%);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
      position: relative;
      overflow: hidden;
    }

    .circle {
      position: absolute;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.3);
      filter: blur(70px);
      animation: float 10s infinite ease-in-out;
      z-index: 0;
    }

    .circle:nth-child(1) {
      width: 300px;
      height: 300px;
      top: 10%;
      left: 10%;
      background: rgba(173, 216, 255, 0.3);
    }

    .circle:nth-child(2) {
      width: 400px;
      height: 400px;
      bottom: 15%;
      right: 10%;
      background: rgba(206, 188, 255, 0.3);
    }

    .circle:nth-child(3) {
      width: 250px;
      height: 250px;
      top: 60%;
      left: 70%;
      background: rgba(180, 200, 255, 0.25);
    }

    .container {
      background: white;
      padding: 48px 40px;
      border-radius: 20px;
      box-shadow: 0 8px 30px rgba(8, 12, 40, 0.08);
      border: 2px solid #e5e7eb;
      width: 100%;
      max-width: 420px;
      position: relative;
      z-index: 1;
    }

    .header {
      text-align: center;
      margin-bottom: 32px;
    }

    h2 {
      color: #1a1a1a;
      font-size: 28px;
      font-weight: 700;
      margin-bottom: 8px;
      letter-spacing: -0.5px;
    }

    .subtitle {
      color: #6b7280;
      font-size: 14px;
      font-weight: 400;
    }

    .input-group {
      margin-bottom: 20px;
    }

    .input-group label {
      display: block;
      font-size: 14px;
      font-weight: 600;
      color: #374151;
      margin-bottom: 8px;
    }

    input {
      width: 100%;
      padding: 12px 16px;
      border: 1.5px solid #e5e7eb;
      border-radius: 10px;
      font-size: 15px;
      font-family: 'Poppins', sans-serif;
      font-weight: 400;
      transition: all 0.2s ease;
      background: #ffffff;
      color: #1f2937;
    }

    input::placeholder {
      color: #9ca3af;
    }

    input:focus {
      outline: none;
      border-color: #667eea;
      box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.08);
    }

    button {
      width: 100%;
      padding: 14px 20px;
      border: none;
      background: #667eea;
      color: white;
      border-radius: 10px;
      cursor: pointer;
      font-size: 15px;
      font-weight: 600;
      font-family: 'Poppins', sans-serif;
      transition: all 0.2s ease;
      margin-top: 24px;
    }

    button:hover {
      background: #5568d3;
      transform: translateY(-1px);
      box-shadow: 0 4px 12px rgba(102, 126, 234, 0.3);
    }

    button:active {
      transform: translateY(0);
    }

    .divider {
      text-align: center;
      margin: 24px 0;
      position: relative;
    }

    .divider::before {
      content: '';
      position: absolute;
      top: 50%;
      left: 0;
      right: 0;
      height: 1px;
      background: #e5e7eb;
    }

    .divider span {
      background: white;
      padding: 0 16px;
      color: #6b7280;
      font-size: 13px;
      position: relative;
      z-index: 1;
    }

    .signup-btn {
      background: white;
      color: #667eea;
      border: 1.5px solid #667eea;
      margin-top: 12px;
    }

    .signup-btn:hover {
      background: #f9fafb;
      border-color: #5568d3;
      color: #5568d3;
    }

    .back-btn {
      position: fixed;
      bottom: 20px;
      left: 20px;
      padding: 6px 16px;
      font-size: 12px;
      font-weight: 600;
      color: #6b7280;
      text-decoration: none;
      border: 1.5px solid #e5e7eb;
      border-radius: 8px;
      transition: all 0.2s ease;
      background: white;
      z-index: 100;
    }

    .back-btn:hover {
      color: #374151;
      border-color: #d1d5db;
      background: #f9fafb;
    }

    @media (max-width: 500px) {
      .container {
        padding: 40px 28px;
      }

      h2 {
        font-size: 24px;
      }
    }
  </style>
</head>

<body>
  <div class="circle"></div>
  <div class="circle"></div>
  <div class="circle"></div>

  <div class="container">
    <div class="header">
      <h2>Admin Login</h2>
      <p class="subtitle">Sign in to your admin account</p>
    </div>
    
    <div class="input-group">
      <label for="email">Email</label>
      <input type="email" id="email" placeholder="name@company.com" required />
    </div>

    <div class="input-group">
      <label for="password">Password</label>
      <input type="password" id="password" placeholder="Enter your password" required />
    </div>

    <button id="loginBtn">Sign in</button>

    <div class="divider">
      <span>or</span>
    </div>

    <button class="signup-btn" onclick="window.location.href='admin_signup.html'">Create account</button>
  </div>

  <a href="../index.html" class="back-btn">← Back to Home</a>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.13.0/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.13.0/firebase-auth.js";
    import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.13.0/firebase-firestore.js";
    import { firebaseConfig } from "../firebase-config.js";

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    document.getElementById("loginBtn").addEventListener("click", async () => {
      const email = document.getElementById("email").value;
      const password = document.getElementById("password").value;

      try {
        const userCredential = await signInWithEmailAndPassword(auth, email, password);
        const user = userCredential.user;

        const docRef = doc(db, "admins", user.uid);
        const docSnap = await getDoc(docRef);

        if (docSnap.exists()) {
          const data = docSnap.data();
          if (data.approved == true) {
            alert("Login successful!");
            window.location.href = "admin_dashboard.html";
          } else {
            alert("Your account is pending approval by the maintainer.");
          }
        } else {
          alert("Admin record not found!");
        }

      } catch (error) {
        alert(error.message);
      }
    });
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>User Signup - Life Link Nexus</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap');

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-20px); }
    }

    body {
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(135deg, #ffffff 40%, #e0e7ff 70%, #d8b4fe 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 20px;
      position: relative;
      overflow: hidden;
    }

    .circle {
      position: absolute;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.3);
      filter: blur(70px);
      animation: float 10s infinite ease-in-out;
      z-index: 0;
    }

    .circle:nth-child(1) {
      width: 300px;
      height: 300px;
      top: 10%;
      left: 10%;
      background: rgba(173, 216, 255, 0.3);
    }

    .circle:nth-child(2) {
      width: 400px;
      height: 400px;
      bottom: 15%;
      right: 10%;
      background: rgba(206, 188, 255, 0.3);
    }

    .circle:nth-child(3) {
      width: 250px;
      height: 250px;
      top: 60%;
      left: 70%;
      background: rgba(180, 200, 255, 0.25);
    }

    .signup-container {
      background: white;
      padding: 48px 40px;
      border-radius: 20px;
      box-shadow: 0 8px 30px rgba(8, 12, 40, 0.08);
      border: 2px solid #e5e7eb;
      width: 100%;
      max-width: 420px;
      position: relative;
      z-index: 1;
    }

    .header {
      text-align: center;
      margin-bottom: 32px;
    }

    h2 {
      color: #1a1a1a;
      font-size: 28px;
      font-weight: 700;
      margin-bottom: 8px;
      letter-spacing: -0.5px;
    }

    .subtitle {
      color: #6b7280;
      font-size: 14px;
      font-weight: 400;
    }

    .input-group {
      margin-bottom: 20px;
    }

    .input-group label {
      display: block;
      font-size: 14px;
      font-weight: 600;
      color: #374151;
      margin-bottom: 8px;
    }

    input {
      width: 100%;
      padding: 12px 16px;
      border: 1.5px solid #e5e7eb;
      border-radius: 10px;
      font-size: 15px;
      font-family: 'Poppins', sans-serif;
      font-weight: 400;
      transition: all 0.2s ease;
      background: #ffffff;
      color: #1f2937;
    }

    input::placeholder {
      color: #9ca3af;
    }

    input:focus {
      outline: none;
      border-color: #667eea;
      box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.08);
    }

    button {
      width: 100%;
      padding: 14px 20px;
      border: none;
      background: #667eea;
      color: white;
      border-radius: 10px;
      cursor: pointer;
      font-size: 15px;
      font-weight: 600;
      font-family: 'Poppins', sans-serif;
      transition: all 0.2s ease;
      margin-top: 24px;
    }

    button:hover {
      background: #5568d3;
      transform: translateY(-1px);
      box-shadow: 0 4px 12px rgba(102, 126, 234, 0.3);
    }

    button:active {
      transform: translateY(0);
    }

    .footer-text {
      text-align: center;
      margin-top: 20px;
      font-size: 14px;
      color: #6b7280;
    }

    .footer-text a {
      color: #667eea;
      text-decoration: none;
      font-weight: 600;
      transition: color 0.2s ease;
    }

    .footer-text a:hover {
      color: #5568d3;
      text-decoration: underline;
    }

    .back-btn {
      position: fixed;
      bottom: 20px;
      left: 20px;
      padding: 6px 16px;
      font-size: 12px;
      font-weight: 600;
      color: #6b7280;
      text-decoration: none;
      border: 1.5px solid #e5e7eb;
      border-radius: 8px;
      transition: all 0.2s ease;
      background: white;
      z-index: 100;
    }

    .back-btn:hover {
      color: #374151;
      border-color: #d1d5db;
      background: #f9fafb;
    }

    @media (max-width: 500px) {
      .signup-container {
        padding: 40px 28px;
      }

      h2 {
        font-size: 24px;
      }
    }
  </style>
</head>
<body>
  <div class="circle"></div>
  <div class="circle"></div>
  <div class="circle"></div>

  <div class="signup-container">
    <div class="header">
      <h2>Create Account</h2>
      <p class="subtitle">Join LifeLink Nexus today</p>
    </div>

    <div class="input-group">
      <label for="name">Full Name</label>
      <input type="text" id="name" placeholder="John Doe" required />
    </div>

    <div class="input-group">
      <label for="email">Email</label>
      <input type="email" id="email" placeholder="name@example.com" required />
    </div>

    <div class="input-group">
      <label for="password">Password</label>
      <input type="password" id="password" placeholder="Create a strong password" required />
    </div>

    <button id="signupBtn">Create Account</button>

    <p class="footer-text">
      Already have an account? <a href="user_login.html">Sign in here</a>
    </p>
  </div>

  <a href="../index.html" class="back-btn">← Back to Home</a>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.13.0/firebase-app.js";
    import { getAuth, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.13.0/firebase-auth.js";
    import { getFirestore, setDoc, doc } from "https://www.gstatic.com/firebasejs/10.13.0/firebase-firestore.js";
    import { firebaseConfig } from "../firebase-config.js";

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    document.getElementById("signupBtn").addEventListener("click", async () => {
      const name = document.getElementById("name").value.trim();
      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value.trim();

      if (!name || !email || !password) {
        alert("Please fill all fields");
        return;
      }

      try {
        const userCredential = await createUserWithEmailAndPassword(auth, email, password);
        const user = userCredential.user;

        // ✅ Store name in Firestore
        await setDoc(doc(db, "users", user.uid), {
          name: name,
          email: email,
          createdAt: new Date().toISOString()
        });

        alert("Account created successfully!");
        window.location.href = "user_login.html";
      } catch (error) {
        alert(error.message);
      }
    });
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>All Urgent Requests - Life Link Nexus</title>

<!-- Google Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<style>
  :root {
    --primary: #667eea;
    --secondary: #764ba2;
    --glass: rgba(255,255,255,0.15);
    --glass-hover: rgba(255,255,255,0.25);
  }

  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  body {
    font-family: 'Poppins', sans-serif;
    background: linear-gradient(135deg, #ffffff 40%, #e0e7ff 70%, #d8b4fe 100%);
    min-height: 100vh;
    padding: 30px;
    position: relative;
    overflow-x: hidden;
  }

  /* Floating blur circles */
  .circle {
    position: fixed;
    border-radius: 50%;
    background: rgba(255, 255, 255, 0.3);
    filter: blur(70px);
    animation: float 10s infinite ease-in-out;
    z-index: 0;
    pointer-events: none;
  }

  .circle:nth-child(1) {
    width: 300px;
    height: 300px;
    top: 10%;
    left: 10%;
    background: rgba(173, 216, 255, 0.3);
  }

  .circle:nth-child(2) {
    width: 400px;
    height: 400px;
    bottom: 15%;
    right: 10%;
    background: rgba(206, 188, 255, 0.3);
  }

  .circle:nth-child(3) {
    width: 250px;
    height: 250px;
    top: 60%;
    left: 70%;
    background: rgba(180, 200, 255, 0.25);
  }

  @keyframes float {
    0%, 100% { transform: translateY(0) scale(1); }
    50% { transform: translateY(-20px) scale(1.05); }
  }

  /* Back Button */
  .back-btn {
    position: fixed;
    top: 15px;
    left: 15px;
    padding: 6px 12px;
    font-size: 11px;
    font-weight: 600;
    color: #4a5568;
    text-decoration: none;
    border: 2px solid rgba(99, 102, 241, 0.3);
    border-radius: 8px;
    transition: all 0.3s ease;
    background: rgba(255, 255, 255, 0.8);
    backdrop-filter: blur(10px);
    z-index: 100;
  }

  .back-btn:hover {
    color: #667eea;
    border-color: #667eea;
    background: rgba(255, 255, 255, 0.95);
    transform: translateX(-3px);
    box-shadow: 0 5px 15px rgba(102, 126, 234, 0.3);
  }

  /* Header */
  .header {
    max-width: 1400px;
    margin: 0 auto 40px;
    text-align: center;
    position: relative;
    z-index: 1;
  }

  .header h1 {
    font-size: 42px;
    font-weight: 800;
    background: linear-gradient(135deg, #667eea, #764ba2, #a78bfa);
    background-clip: text;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    margin-bottom: 10px;
  }

  .header p {
    color: #6b7280;
    font-size: 16px;
    font-weight: 500;
  }

  /* Stats Cards */
  .stats-grid {
    max-width: 1400px;
    margin: 0 auto 40px;
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
    gap: 20px;
    position: relative;
    z-index: 1;
  }

  .stat-card {
    background: rgba(255, 255, 255, 0.85);
    backdrop-filter: blur(20px);
    border: 2px solid rgba(255, 255, 255, 0.4);
    padding: 25px;
    border-radius: 16px;
    transition: all 0.3s ease;
    box-shadow: 0 8px 30px rgba(102, 126, 234, 0.1);
  }

  .stat-card:hover {
    transform: translateY(-5px);
    border-color: rgba(102, 126, 234, 0.5);
    box-shadow: 0 15px 40px rgba(102, 126, 234, 0.2);
  }

  .stat-card h3 {
    font-size: 36px;
    font-weight: 800;
    background: linear-gradient(135deg, #667eea, #764ba2);
    background-clip: text;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    margin-bottom: 8px;
  }

  .stat-card p {
    color: #6b7280;
    font-size: 14px;
    font-weight: 600;
  }

  /* Tab Navigation */
  .tab-navigation {
    max-width: 1400px;
    margin: 0 auto 30px;
    display: flex;
    gap: 15px;
    justify-content: center;
    flex-wrap: wrap;
    position: relative;
    z-index: 1;
  }

  .tab-btn {
    padding: 12px 28px;
    border: none;
    border-radius: 12px;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.3s ease;
    background: rgba(255, 255, 255, 0.7);
    color: #6b7280;
    border: 2px solid rgba(99, 102, 241, 0.2);
  }

  .tab-btn.active {
    background: linear-gradient(135deg, #667eea, #764ba2);
    color: white;
    border-color: transparent;
    box-shadow: 0 8px 25px rgba(102, 126, 234, 0.3);
  }

  .tab-btn:hover:not(.active) {
    background: rgba(255, 255, 255, 0.9);
    border-color: rgba(102, 126, 234, 0.4);
    transform: translateY(-2px);
  }

  /* Requests Container */
  .requests-container {
    max-width: 1400px;
    margin: 0 auto;
    position: relative;
    z-index: 1;
  }

  .tab-content {
    display: none;
  }

  .tab-content.active {
    display: block;
    animation: fadeIn 0.4s ease;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* Request Cards Grid */
  .requests-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(380px, 1fr));
    gap: 25px;
  }

  .request-card {
    background: rgba(255, 255, 255, 0.85);
    backdrop-filter: blur(20px);
    border: 2px solid rgba(255, 255, 255, 0.4);
    padding: 25px;
    border-radius: 16px;
    transition: all 0.3s ease;
    position: relative;
    overflow: hidden;
    box-shadow: 0 8px 30px rgba(102, 126, 234, 0.1);
  }

  .request-card::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 4px;
    background: linear-gradient(90deg, #ef4444, #dc2626);
  }

  .request-card.blood::before {
    background: linear-gradient(90deg, #ef4444, #dc2626);
  }

  .request-card.organ::before {
    background: linear-gradient(90deg, #8b5cf6, #7c3aed);
  }

  .request-card:hover {
    transform: translateY(-5px);
    border-color: rgba(102, 126, 234, 0.5);
    box-shadow: 0 15px 40px rgba(102, 126, 234, 0.2);
  }

  .request-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 20px;
  }

  .request-type {
    display: inline-block;
    padding: 6px 14px;
    border-radius: 20px;
    font-size: 12px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .request-type.blood {
    background: linear-gradient(135deg, #fee2e2, #fecaca);
    color: #991b1b;
  }

  .request-type.organ {
    background: linear-gradient(135deg, #ede9fe, #ddd6fe);
    color: #5b21b6;
  }

  .request-id {
    color: #9ca3af;
    font-size: 12px;
    font-family: monospace;
  }

  .request-details {
    margin-bottom: 20px;
  }

  .detail-row {
    display: flex;
    justify-content: space-between;
    padding: 10px 0;
    border-bottom: 1px solid rgba(0, 0, 0, 0.05);
    gap: 15px;
  }

  .detail-row:last-child {
    border-bottom: none;
  }

  .detail-label {
    color: #6b7280;
    font-size: 13px;
    font-weight: 500;
    flex-shrink: 0;
  }

  .detail-value {
    color: #1f2937;
    font-size: 14px;
    font-weight: 600;
    text-align: right;
    word-break: break-word;
  }

  .phone-link {
    color: #1f2937;
    text-decoration: none;
    display: inline-flex;
    align-items: center;
    gap: 5px;
    transition: all 0.2s ease;
  }

  .phone-link:hover {
    color: #667eea;
    transform: translateX(2px);
  }

  .email-link {
    color: #1f2937;
    text-decoration: none;
    display: inline-flex;
    align-items: center;
    gap: 5px;
    transition: all 0.2s ease;
    word-break: break-all;
  }

  .email-link:hover {
    color: #667eea;
    text-decoration: underline;
  }

  .blood-group {
    display: inline-block;
    padding: 4px 12px;
    background: linear-gradient(135deg, #ef4444, #dc2626);
    color: white;
    border-radius: 8px;
    font-weight: 700;
    font-size: 14px;
  }

  .organ-name {
    display: inline-block;
    padding: 4px 12px;
    background: linear-gradient(135deg, #8b5cf6, #7c3aed);
    color: white;
    border-radius: 8px;
    font-weight: 700;
    font-size: 14px;
  }

  .empty-state {
    text-align: center;
    padding: 80px 20px;
    color: #6b7280;
  }

  .empty-state h3 {
    font-size: 24px;
    margin-bottom: 10px;
    color: #4b5563;
  }

  .loading {
    text-align: center;
    padding: 80px 20px;
    font-size: 18px;
    color: #6b7280;
  }

  /* Responsive */
  @media (max-width: 768px) {
    .requests-grid {
      grid-template-columns: 1fr;
    }

    .header h1 {
      font-size: 32px;
    }

    .stats-grid {
      grid-template-columns: 1fr;
    }
  }
</style>
</head>
<body>

<!-- Floating blur circles -->
<div class="circle"></div>
<div class="circle"></div>
<div class="circle"></div>

<!-- Back Button -->
<a href="user_dashboard.html" class="back-btn">← Back to Dashboard</a>

<!-- Header -->
<div class="header">
  <h1>📋 All Urgent Requests</h1>
  <p>View all blood and organ requests from users</p>
</div>

<!-- Statistics -->
<div class="stats-grid">
  <div class="stat-card">
    <h3 id="totalRequests">0</h3>
    <p>🔵 Total Requests</p>
  </div>
  <div class="stat-card">
    <h3 id="bloodRequestsCount">0</h3>
    <p>🩸 Blood Requests</p>
  </div>
  <div class="stat-card">
    <h3 id="organRequestsCount">0</h3>
    <p>🫀 Organ Requests</p>
  </div>
</div>

<!-- Tab Navigation -->
<div class="tab-navigation">
  <button class="tab-btn active" onclick="switchTab('all')">All Requests</button>
  <button class="tab-btn" onclick="switchTab('blood')">Blood Requests</button>
  <button class="tab-btn" onclick="switchTab('organ')">Organ Requests</button>
</div>

<!-- Requests Container -->
<div class="requests-container">
  <div id="allRequests" class="tab-content active">
    <div id="allRequestsGrid" class="requests-grid">
      <div class="loading">⏳ Loading requests...</div>
    </div>
  </div>

  <div id="bloodRequests" class="tab-content">
    <div id="bloodRequestsGrid" class="requests-grid">
      <div class="loading">⏳ Loading blood requests...</div>
    </div>
  </div>

  <div id="organRequests" class="tab-content">
    <div id="organRequestsGrid" class="requests-grid">
      <div class="loading">⏳ Loading organ requests...</div>
    </div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.13.0/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.13.0/firebase-auth.js";
import { getFirestore, collection, getDocs, query, where } from "https://www.gstatic.com/firebasejs/10.13.0/firebase-firestore.js";
import { firebaseConfig } from "../firebase-config.js";

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let allBloodRequests = [];
let allOrganRequests = [];
let currentUser = null;

// Check if user is logged in
onAuthStateChanged(auth, async (user) => {
  if (!user) {
    alert("Please login first!");
    window.location.href = "user_login.html";
  } else {
    currentUser = user;
    await loadMyRequests();
  }
});

// Load user's own requests
async function loadMyRequests() {
  try {
    const bloodQuery = collection(db, "bloodrequest");
    const bloodSnapshot = await getDocs(bloodQuery);
    allBloodRequests = [];
    bloodSnapshot.forEach(doc => {
      allBloodRequests.push({ id: doc.id, type: 'blood', ...doc.data() });
    });

    // Sort in JavaScript
    allBloodRequests.sort((a, b) => {
      return (b.timestamp?.seconds || 0) - (a.timestamp?.seconds || 0);
    });

    const organQuery = collection(db, "organrequests");
    const organSnapshot = await getDocs(organQuery);
    allOrganRequests = [];
    organSnapshot.forEach(doc => {
      allOrganRequests.push({ id: doc.id, type: 'organ', ...doc.data() });
    });

    // Sort in JavaScript
    allOrganRequests.sort((a, b) => {
      return (b.timestamp?.seconds || 0) - (a.timestamp?.seconds || 0);
    });

    // Update stats
    updateStats();

    // Display requests
    displayAllRequests();
    displayBloodRequests();
    displayOrganRequests();

  } catch (error) {
    console.error("Error loading requests:", error);
    document.getElementById("allRequestsGrid").innerHTML = `
      <div class="empty-state">
        <h3>❌ Error Loading Requests</h3>
        <p>${error.message}</p>
      </div>
    `;
  }
}

// Update statistics
function updateStats() {
  const totalRequests = allBloodRequests.length + allOrganRequests.length;
  document.getElementById("totalRequests").textContent = totalRequests;
  document.getElementById("bloodRequestsCount").textContent = allBloodRequests.length;
  document.getElementById("organRequestsCount").textContent = allOrganRequests.length;
}

// Display all requests
function displayAllRequests() {
  const container = document.getElementById("allRequestsGrid");
  const allRequests = [...allBloodRequests, ...allOrganRequests].sort((a, b) => {
    return (b.timestamp?.seconds || 0) - (a.timestamp?.seconds || 0);
  });

  if (allRequests.length === 0) {
    container.innerHTML = `
      <div class="empty-state">
        <h3>📭 No Requests Found</h3>
        <p>There are no active blood or organ requests at the moment.</p>
      </div>
    `;
    return;
  }

  container.innerHTML = allRequests.map(req => createRequestCard(req)).join('');
}

// Display blood requests
function displayBloodRequests() {
  const container = document.getElementById("bloodRequestsGrid");

  if (allBloodRequests.length === 0) {
    container.innerHTML = `
      <div class="empty-state">
        <h3>📭 No Blood Requests</h3>
        <p>There are no blood requests at the moment.</p>
      </div>
    `;
    return;
  }

  container.innerHTML = allBloodRequests.map(req => createRequestCard(req)).join('');
}

// Display organ requests
function displayOrganRequests() {
  const container = document.getElementById("organRequestsGrid");

  if (allOrganRequests.length === 0) {
    container.innerHTML = `
      <div class="empty-state">
        <h3>📭 No Organ Requests</h3>
        <p>There are no organ requests at the moment.</p>
      </div>
    `;
    return;
  }

  container.innerHTML = allOrganRequests.map(req => createRequestCard(req)).join('');
}

// Create request card HTML
function createRequestCard(req) {
  const date = req.timestamp?.toDate ? new Date(req.timestamp.toDate()).toLocaleDateString() : 'N/A';
  const time = req.timestamp?.toDate ? new Date(req.timestamp.toDate()).toLocaleTimeString() : 'N/A';

  if (req.type === 'blood') {
    return `
      <div class="request-card blood">
        <div class="request-header">
          <span class="request-type blood">🩸 Blood Request</span>
          <span class="request-id">#${req.id.substring(0, 8)}</span>
        </div>
        <div class="request-details">
          <div class="detail-row">
            <span class="detail-label">Requester Name</span>
            <span class="detail-value">${req.name || 'N/A'}</span>
          </div>
          <div class="detail-row">
            <span class="detail-label">Blood Group</span>
            <span class="blood-group">${req.bloodGroup || 'N/A'}</span>
          </div>
          <div class="detail-row">
            <span class="detail-label">Age</span>
            <span class="detail-value">${req.age || 'N/A'} years</span>
          </div>
          <div class="detail-row">
            <span class="detail-label">Contact Number</span>
            <span class="detail-value"><a href="tel:${req.contact || ''}" class="phone-link">📱 ${req.contact || 'N/A'}</a></span>
          </div>
          ${req.email ? `
          <div class="detail-row">
            <span class="detail-label">Email</span>
            <span class="detail-value"><a href="mailto:${req.email}" class="email-link">📧 ${req.email}</a></span>
          </div>
          ` : ''}
          <div class="detail-row">
            <span class="detail-label">Address</span>
            <span class="detail-value">${req.address || 'N/A'}</span>
          </div>
          <div class="detail-row">
            <span class="detail-label">Request Date</span>
            <span class="detail-value">${date} at ${time}</span>
          </div>
        </div>
      </div>
    `;
  } else {
    return `
      <div class="request-card organ">
        <div class="request-header">
          <span class="request-type organ">🫀 Organ Request</span>
          <span class="request-id">#${req.id.substring(0, 8)}</span>
        </div>
        <div class="request-details">
          <div class="detail-row">
            <span class="detail-label">Requester Name</span>
            <span class="detail-value">${req.name || 'N/A'}</span>
          </div>
          <div class="detail-row">
            <span class="detail-label">Organ Type</span>
            <span class="organ-name">${req.organ || 'N/A'}</span>
          </div>
          <div class="detail-row">
            <span class="detail-label">Age</span>
            <span class="detail-value">${req.age || 'N/A'} years</span>
          </div>
          <div class="detail-row">
            <span class="detail-label">Contact Number</span>
            <span class="detail-value"><a href="tel:${req.contact || ''}" class="phone-link">📱 ${req.contact || 'N/A'}</a></span>
          </div>
          ${req.email ? `
          <div class="detail-row">
            <span class="detail-label">Email</span>
            <span class="detail-value"><a href="mailto:${req.email}" class="email-link">📧 ${req.email}</a></span>
          </div>
          ` : ''}
          <div class="detail-row">
            <span class="detail-label">Address</span>
            <span class="detail-value">${req.address || 'N/A'}</span>
          </div>
          <div class="detail-row">
            <span class="detail-label">Request Date</span>
            <span class="detail-value">${date} at ${time}</span>
          </div>
        </div>
      </div>
    `;
  }
}

// Switch tabs
window.switchTab = function(tab) {
  // Update tab buttons
  document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
  event.target.classList.add('active');

  // Update content
  document.querySelectorAll('.tab-content').forEach(content => content.classList.remove('active'));
  
  if (tab === 'all') {
    document.getElementById('allRequests').classList.add('active');
  } else if (tab === 'blood') {
    document.getElementById('bloodRequests').classList.add('active');
  } else if (tab === 'organ') {
    document.getElementById('organRequests').classList.add('active');
  }
}
</script>

</body>
</html>

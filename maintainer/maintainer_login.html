<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <title>Maintainer Login - Life Link Nexus</title>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap');

        :root {
            --bg1: #0f172a;
            --glass: rgba(255, 255, 255, 0.06);
            --neon: #8b5cf6;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        @keyframes float {

            0%,
            100% {
                transform: translateY(0);
            }

            50% {
                transform: translateY(-20px);
            }
        }

        body {
            font-family: 'Poppins', sans-serif;
            background:
                radial-gradient(1000px 500px at -10% 10%, rgba(124, 58, 237, 0.12), transparent 10%),
                radial-gradient(800px 400px at 110% 90%, rgba(99, 102, 241, 0.08), transparent 10%),
                linear-gradient(180deg, var(--bg1), #081024);
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            height: 100vh;
            padding: 20px;
            position: relative;
            overflow: hidden;
            margin: 0;
        }

        .circle {
            position: fixed;
            border-radius: 50%;
            filter: blur(70px);
            animation: float 10s infinite ease-in-out;
            z-index: 0;
        }

        .circle:nth-child(1) {
            width: 300px;
            height: 300px;
            top: 10%;
            left: 10%;
            background: rgba(124, 58, 237, 0.12);
        }

        .circle:nth-child(2) {
            width: 400px;
            height: 400px;
            bottom: 15%;
            right: 10%;
            background: rgba(99, 102, 241, 0.08);
        }

        .circle:nth-child(3) {
            width: 250px;
            height: 250px;
            top: 60%;
            left: 70%;
            background: rgba(139, 92, 246, 0.10);
        }

        .container {
            background: linear-gradient(180deg, rgba(255, 255, 255, 0.04), rgba(255, 255, 255, 0.02));
            backdrop-filter: blur(10px) saturate(120%);
            border: 1px solid rgba(255, 255, 255, 0.06);
            padding: 48px 40px;
            border-radius: 20px;
            box-shadow: 0 8px 40px rgba(2, 6, 23, 0.6), 0 1px 0 rgba(255, 255, 255, 0.02) inset;
            width: 100%;
            max-width: 420px;
            position: relative;
            z-index: 1;
            animation: fadeSlideUp 0.6s ease-out;
        }

        @keyframes fadeSlideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .header {
            text-align: center;
            margin-bottom: 32px;
        }

        .header h2 {
            font-size: 28px;
            font-weight: 800;
            color: #fff;
            margin-bottom: 8px;
            text-shadow: 0 4px 20px rgba(139, 92, 246, 0.3);
        }

        .header p {
            color: rgba(255, 255, 255, 0.75);
            font-size: 14px;
            font-weight: 500;
        }

        .input-group {
            margin-bottom: 20px;
        }

        .input-group label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            color: rgba(255, 255, 255, 0.85);
            margin-bottom: 8px;
        }

        input {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 10px;
            font-size: 15px;
            font-family: 'Poppins', sans-serif;
            font-weight: 400;
            transition: all 0.2s ease;
            background: linear-gradient(180deg, rgba(255, 255, 255, 0.02), rgba(255, 255, 255, 0.01));
            color: #fff;
        }

        input::placeholder {
            color: rgba(255, 255, 255, 0.45);
        }

        input:focus {
            outline: none;
            border-color: rgba(124, 58, 237, 0.5);
            box-shadow: 0 0 0 3px rgba(124, 58, 237, 0.15);
            background: linear-gradient(180deg, rgba(255, 255, 255, 0.04), rgba(255, 255, 255, 0.02));
        }

        button {
            width: 100%;
            padding: 14px 20px;
            border: none;
            background: linear-gradient(90deg, #7c3aed, #6366f1);
            color: white;
            border-radius: 10px;
            cursor: pointer;
            font-size: 15px;
            font-weight: 600;
            font-family: 'Poppins', sans-serif;
            transition: all 0.2s ease;
            margin-top: 24px;
            box-shadow: 0 12px 40px rgba(99, 102, 241, 0.12);
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(102, 126, 234, 0.3);
        }

        button:active {
            transform: translateY(0);
        }

        .back-btn {
            position: fixed;
            bottom: 20px;
            left: 20px;
            padding: 6px 16px;
            font-size: 12px;
            font-weight: 600;
            color: rgba(255, 255, 255, 0.85);
            text-decoration: none;
            border: 1.5px solid rgba(255, 255, 255, 0.15);
            border-radius: 8px;
            transition: all 0.2s ease;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            z-index: 100;
        }

        .back-btn:hover {
            color: #ffffff;
            border-color: rgba(255, 255, 255, 0.3);
            background: rgba(255, 255, 255, 0.1);
        }

        @media (max-width: 500px) {
            .container {
                padding: 40px 28px;
            }

            .header h2 {
                font-size: 24px;
            }
        }
    </style>
</head>

<body>
    <!-- Floating blur circles -->
    <div class="circle"></div>
    <div class="circle"></div>
    <div class="circle"></div>

    <!-- Back Button -->
    <a href="../index.html" class="back-btn">← Back</a>

    <div class="container">
        <div class="header">
            <h2>Maintainer Login</h2>
            <p>Access system maintenance panel</p>
        </div>

        <div class="input-group">
            <label for="email">Email Address</label>
            <input type="email" id="email" placeholder="Enter your email" required />
        </div>

        <div class="input-group">
            <label for="password">Password</label>
            <input type="password" id="password" placeholder="Enter your password" required />
        </div>

        <button id="loginBtn">Login to Dashboard</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.13.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, signOut } from "https://www.gstatic.com/firebasejs/10.13.0/firebase-auth.js";
        import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.13.0/firebase-firestore.js";
        import { firebaseConfig } from "../firebase-config.js";

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        document.getElementById("loginBtn").addEventListener("click", async () => {
            const email = document.getElementById("email").value.trim();
            const password = document.getElementById("password").value.trim();

            if (!email || !password) {
                alert("Please fill in all fields.");
                return;
            }

            try {
                const userCredential = await signInWithEmailAndPassword(auth, email, password);

                // Security Check: Attempt to read maintainer-only database document
                try {
                    await getDoc(doc(db, "maintainer", "config"));
                    alert("Maintainer logged in successfully!");
                    window.location.href = "maintainer_dashboard.html";
                } catch (permError) {
                    await signOut(auth);
                    alert("Unauthorized. Only the system maintainer can access this dashboard.");
                }
            } catch (error) {
                alert(error.message);
            }
        });
    </script>
</body>

</html>

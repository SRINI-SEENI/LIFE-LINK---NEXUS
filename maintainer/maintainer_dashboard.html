<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <title>Maintainer Dashboard - Life Link Nexus</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">

    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #ffffff 40%, #e0e7ff 70%, #d8b4fe 100%);
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            position: relative;
            overflow-x: hidden;
        }

        .circle {
            position: fixed;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.3);
            filter: blur(70px);
            animation: float 10s infinite ease-in-out;
            z-index: 0;
            pointer-events: none;
        }

        .circle-1 {
            width: 300px;
            height: 300px;
            top: 10%;
            left: 10%;
            background: rgba(173, 216, 255, 0.3);
        }

        .circle-2 {
            width: 400px;
            height: 400px;
            bottom: 15%;
            right: 10%;
            background: rgba(206, 188, 255, 0.3);
        }

        .circle-3 {
            width: 250px;
            height: 250px;
            top: 60%;
            left: 70%;
            background: rgba(180, 200, 255, 0.25);
        }

        @keyframes float {

            0%,
            100% {
                transform: translateY(0);
            }

            50% {
                transform: translateY(-20px);
            }
        }

        .dashboard {
            position: relative;
            z-index: 2;
            background: white;
            padding: 40px;
            border-radius: 24px;
            box-shadow: 0 10px 40px rgba(8, 12, 40, 0.06);
            width: 95%;
            max-width: 1050px;
            margin: 40px auto;
            text-align: center;
            animation: fadeIn 0.8s ease-out;
        }

        h1 {
            color: #4b0082;
            font-size: 32px;
            font-weight: 800;
            margin: 0 0 8px 0;
            letter-spacing: -0.5px;
        }

        .subtitle {
            color: #6b7280;
            font-size: 15px;
            font-weight: 500;
            margin-bottom: 30px;
        }

        .table-responsive {
            overflow-x: auto;
            border-radius: 16px;
            border: 1.5px solid #e5e7eb;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.02);
            background: white;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th,
        td {
            padding: 16px 20px;
            text-align: left;
            font-size: 14px;
            border-bottom: 1.5px solid #f3f4f6;
        }

        th {
            background: linear-gradient(135deg, #7c3aed 0%, #6366f1 100%);
            color: white;
            font-weight: 700;
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        td {
            color: #374151;
            font-weight: 500;
        }

        tr:last-child td {
            border-bottom: none;
        }

        tr:hover td {
            background-color: #f9fafb;
        }

        button {
            padding: 8px 16px;
            border: none;
            border-radius: 10px;
            color: white;
            cursor: pointer;
            font-weight: 700;
            font-size: 13px;
            transition: all 0.2s ease;
        }

        button:hover {
            transform: translateY(-1px);
        }

        button:active {
            transform: translateY(0);
        }

        .approve-btn {
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
            box-shadow: 0 4px 12px rgba(16, 185, 129, 0.2);
            margin-right: 8px;
        }

        .approve-btn:hover {
            background: linear-gradient(135deg, #059669 0%, #047857 100%);
            box-shadow: 0 6px 16px rgba(16, 185, 129, 0.3);
        }

        .reject-btn {
            background: linear-gradient(135deg, #ef4444 0%, #dc2626 100%);
            box-shadow: 0 4px 12px rgba(239, 68, 68, 0.2);
        }

        .reject-btn:hover {
            background: linear-gradient(135deg, #dc2626 0%, #b91c1c 100%);
            box-shadow: 0 6px 16px rgba(239, 68, 68, 0.3);
        }

        footer {
            margin-top: auto;
            padding: 20px;
            color: #6b7280;
            font-size: 13px;
            font-weight: 500;
        }

        .logout-flow-btn {
            padding: 8px 18px;
            font-size: 11px;
            background: #ef4444;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            z-index: 100;
            font-weight: 600;
            transition: all 0.2s;
            box-shadow: 0 4px 12px rgba(239, 68, 68, 0.25);
            margin: 25px auto 10px auto;
            display: block;
        }

        .logout-flow-btn:hover {
            background: linear-gradient(135deg, #ff5a5a, #ff8f4c);
            transform: scale(1.08);
            box-shadow: 0 6px 20px rgba(255, 80, 80, 0.5);
            letter-spacing: 0.5px;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(15px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>

<body>
    <div class="circle circle-1"></div>
    <div class="circle circle-2"></div>
    <div class="circle circle-3"></div>

    <div class="dashboard">
        <h1>Maintainer Dashboard</h1>
        <p class="subtitle">Review and verify administrator application requests</p>

        <div class="table-responsive">
            <table>
                <thead>
                    <tr>
                        <th>Name</th>
                        <th>Email</th>
                        <th>Role</th>
                        <th>Phone</th>
                        <th>Address</th>
                        <th>Status</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody id="adminTable">
                    <tr>
                        <td colspan="7" style="text-align:center; color: #6b7280; padding: 30px;">⏳ Loading requests...
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <button class="logout-flow-btn" onclick="logout()">Logout</button>

    <footer>© 2025 Life Link Nexus | Maintainer Panel</footer>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.13.0/firebase-app.js";
        import { getFirestore, collection, getDocs, updateDoc, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.13.0/firebase-firestore.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.13.0/firebase-auth.js";
        import { firebaseConfig } from "../firebase-config.js";

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        // ✅ Load all pending admin requests from Firestore
        async function loadRequests() {
            const tableBody = document.getElementById("adminTable");
            tableBody.innerHTML = "";
            const snapshot = await getDocs(collection(db, "adminRequests"));
            let found = false;

            snapshot.forEach(async (docSnap) => {
                const data = docSnap.data();
                if (data && data.approved === false) {
                    found = true;
                    const row =
                        `<tr>
                        <td style="font-weight: 600;">${data.name}</td>
                        <td>${data.email}</td>
                        <td><span style="background: #ede9fe; color: #5b21b6; padding: 4px 10px; border-radius: 12px; font-size: 12px; font-weight: 600;">${data.role}</span></td>
                        <td>${data.phone}</td>
                        <td>${data.AboutADMIN}</td>
                        <td><span style="background: #fef3c7; color: #92400e; padding: 4px 10px; border-radius: 12px; font-size: 12px; font-weight: 600;">Pending</span></td>
                        <td>
                            <div style="display: flex; gap: 8px; white-space: nowrap; justify-content: flex-start;">
                                <button class="approve-btn" style="margin-right: 0;" onclick="approve('${docSnap.id}')">Approve</button>
                                <button class="reject-btn" onclick="reject('${docSnap.id}')">Reject</button>
                            </div>
                        </td>
                    </tr>`;
                    tableBody.innerHTML += row;
                }
            });

            if (!found) {
                tableBody.innerHTML =
                    `<tr><td colspan="7" style="text-align:center; color: #6b7280; padding: 30px;">No pending requests 🎉</td></tr>`;
            }
        }

        // ✅ Approve function
        window.approve = async function (id) {
            const reqRef = doc(db, "adminRequests", id);
            const reqSnap = await getDoc(reqRef);
            const data = reqSnap.data();

            if (!data) return alert("Error: Request data missing");

            // ✅ Mark request as approved
            await updateDoc(reqRef, { approved: true });

            // ✅ Move user to admins collection
            await setDoc(doc(db, "admins", id), {
                uid: id,
                name: data.name,
                email: data.email,
                phone: data.phone,
                role: data.role,
                address: data.AboutADMIN,
                approved: true,
                status: "approved",
                createdAt: new Date().toISOString()
            });

            alert(`✅ ${data.name} approved as admin`);
            loadRequests();
        };

        // ❌ Reject function
        window.reject = async function (id) {
            await updateDoc(doc(db, "adminRequests", id), { approved: "rejected" });
            alert("❌ Request rejected!");
            loadRequests();
        };

        // 🚪 Logout function
        window.logout = async function () {
            await signOut(auth);
            alert("Logged out successfully!");
            window.location.href = "../index.html";
        };

        // ✅ Ensure only maintainer can access this page
        onAuthStateChanged(auth, (user) => {
            if (user && user.email === atob("bWFpbnRhaW5lcm9mbGxuNDA0QGdtYWlsLmNvbQ==")) {
                loadRequests();
            } else {
                alert("Access denied. Only maintainer can view this page.");
                window.location.href = "maintainer_login.html";
            }
        });
    </script>
</body>

</html>
